<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instinto Superior - Mapa Numerológico Premium</title>
    <style>
  :root { --gold: #d4af37; --dark: #000000; --card-bg: #ffffff; --text: #1a1a1a; }

        /* --- CONFIGURAÇÃO DE IMPRESSÃO (PDF) --- */
        @media print {
            body { background: #fff !important; color: #000 !important; padding: 0 !important; }
            .no-print { display: none !important; }
            .secao-premium { 
                box-shadow: none !important; 
                margin: 0 !important; 
                width: 100% !important; 
                max-width: 100% !important;
                page-break-inside: avoid; /* Evita quebrar um card no meio */
            }
            .quebra-pagina { page-break-before: always; }
            .capa { height: 100vh !important; border: 10px double var(--gold) !important; }
        }

        /* --- ESTILO VISUAL DO SITE --- */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--dark); 
            color: var(--text-light); 
            margin: 0; 
            padding: 0;
            line-height: 1.6;
        }

        /* Painel de Entrada */
        .painel-controle {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background: #111;
            border: 1px solid var(--gold);
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn-gerar {
            width: 100%;
            padding: 20px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-gerar:hover { background: var(--gold-light); transform: translateY(-2px); }

        /* Botão Flutuante PDF */
        .btn-pdf {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #cc0000;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* --- ESTRUTURA DO RELATÓRIO PREMIUM --- */
        .relatorio-container {
            width: 100%;
            max-width: 850px; /* Largura ideal para folha A4 */
            margin: 0 auto;
        }

        /* Capa */
        .capa {
            height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 15px double var(--gold);
            margin-bottom: 50px;
            background: #050505;
            padding: 40px;
            box-sizing: border-box;
        }

        .logo-placeholder {
            width: 150px;
            height: 150px;
            border: 2px solid var(--gold);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--gold);
        }

        /* Sumário */
        .sumario {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 10px;
            margin-bottom: 50px;
            border-left: 5px solid var(--gold);
        }

        /* Seções de Conteúdo */
        .secao-premium {
            background: var(--card-bg);
            color: var(--text-dark);
            padding: 50px;
            margin-bottom: 30px;
            border-radius: 2px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
        }

        .titulo-topico {
            font-size: 28px;
            text-transform: uppercase;
            color: #000;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .intro-texto {
            font-size: 16px;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.8;
            white-space: pre-line; /* Mantém os parágrafos do textos.js */
            border-left: 4px solid #eee;
            padding-left: 20px;
        }

        .resultado-texto {
            font-size: 17px;
            color: #222;
        }

        strong { color: #b8860b; }

    </style>
</head>
<body>

    <div class="container no-print">
        <div class="painel-controle">
            <h1 style="color: var(--gold); margin-top: 0;">INSTINTO SUPERIOR</h1>
            <p>Insira os dados para gerar o Relatório Premium</p>
            <input type="text" id="nome" placeholder="NOME COMPLETO">
            <input type="date" id="data">
            <button class="btn-gerar" onclick="gerarMapaPremium()">GERAR MAPA PREMIUM</button>
        </div>
    </div>

    <div id="resultado" class="relatorio-container"></div>

    <script src="textos.js"></script>
    <script>
        // Aqui virá a lógica de cálculo que vamos construir no próximo passo
        function gerarMapaPremium() {
            // Placeholder para a função que vamos criar
            alert("Estrutura carregada! Pronto para injetar a lógica de cálculos.");
        }
    </script>

</body>
</html>
