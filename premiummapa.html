<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Premium - Instinto Superior</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #2563eb;
            --bg-grafico: #fdf5e6;
            --border-grafico: #d4c4a8;
        }

        body {
            font-family: "Times New Roman", serif;
            color: #111;
            background: #f4f4f4;
            line-height: 1.8;
            margin: 0;
            padding: 20px;
        }

        #folha-a4 {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        /* CAPA */
        .capa {
            text-align: center;
            padding: 100px 0;
            border-bottom: 3px double #eee;
            margin-bottom: 50px;
        }
        .logo { max-width: 180px; margin-bottom: 20px; }
        .titulo-capa { font-size: 36px; letter-spacing: 4px; font-weight: bold; }
        .nome-cliente { font-size: 28px; margin-top: 40px; text-transform: uppercase; color: var(--accent); }

        /* SEÇÕES */
        .secao {
            margin-bottom: 40px;
            page-break-inside: avoid;
        }
        h2 {
            font-size: 24px;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
            color: var(--primary);
            text-transform: uppercase;
        }
        .numero-destaque {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent);
            margin: 10px 0;
        }
        .texto-conteudo {
            text-align: justify;
            white-space: pre-line;
        }

        /* GRÁFICOS (ESTILO IGUAL AO INDEX) */
        .grafico-container {
            background: var(--bg-grafico);
            border: 2px solid var(--border-grafico);
            padding: 25px;
            border-radius: 12px;
            margin: 30px 0;
            text-align: center;
        }

        /* Cores das Barras de Análise */
        .barra-potencial { background: linear-gradient(90deg, #dcfce7, #166534) !important; } 
        .barra-essencia { background: linear-gradient(90deg, #f3e8ff, #6b21a8) !important; }  
        .barra-capacidade { background: linear-gradient(90deg, #ffedd5, #ea580c) !important; }
        
        .barra-fundo { height: 16px; background: #eee; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
        .preenchimento { height: 100%; border-radius: 8px; transition: width 1s ease-in-out; }

        /* BOTÃO PDF */
        .no-print {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            #folha-a4 { box-shadow: none; border: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

<button class="no-print" onclick="baixarPDF()">📥 Baixar Relatório em PDF</button>

<div id="folha-a4">
    <div class="capa">
        <img src="https://hemricciinstintosuperior-rcci.github.io/estudo_numerologico/icon-192.png" class="logo">
        <div class="titulo-capa">ESTUDO NUMEROLÓGICO</div>
        <div style="font-size: 18px; color: #666;">RELATÓRIO PERSONALIZADO PREMIUM</div>
        <div class="nome-cliente" id="label-nome">AGUARDANDO DADOS...</div>
        <div id="label-data">--/--/----</div>
    </div>

    <div id="area-dos-graficos" class="grafico-container">
        <p>Carregando análises vibracionais...</p>
    </div>

    <div id="conteudo-dinamico">
        </div>

    <div style="text-align: center; margin-top: 100px; color: #888; font-size: 12px;">
        Este relatório é de uso pessoal e exclusivo.<br>
        © Instinto Superior - Todos os direitos reservados.
    </div>
</div>

<script>
window.onload = function() {
    const dadosBrutos = localStorage.getItem("dadosMapaPremium");
    const g1 = localStorage.getItem("graficoParaOPremium");
    const g2 = localStorage.getItem("graficosAnalisePremium");

    if (!dadosBrutos) {
        document.body.innerHTML = "<h2 style='text-align:center; margin-top:100px;'>⚠️ Nenhum dado encontrado. Por favor, gere o mapa no site primeiro.</h2>";
        return;
    }

    const dados = JSON.parse(dadosBrutos);

    // 1. Preenche a Capa
    document.getElementById("label-nome").innerText = dados.nome;
    document.getElementById("label-data").innerText = dados.data;

    // 2. Injeta os Gráficos na "Casinha" deles
    const containerGrafico = document.getElementById("area-dos-graficos");
    if (g1) {
        containerGrafico.innerHTML = `
            <h2 style="border:none; margin-bottom:20px;">Sua Orientação Vibracional</h2>
            ${g1}
            <div style="margin-top:30px;">${g2 || ""}</div>
        `;
    }

    // 3. Função para limpar texto (Nome e Gênero)
    function formatarTexto(texto) {
        if (!texto) return "";
        let pNome = dados.nome.split(' ')[0];
        let nomeBonito = pNome.charAt(0).toUpperCase() + pNome.slice(1).toLowerCase();
        
        let t = texto.replace(/você/gi, `<strong>${nomeBonito}</strong>`);
        t = t.replace(/\(a\)/gi, "").replace(/\(o\)/gi, "").replace(/\(as\)/gi, "").replace(/\(os\)/gi, "");
        return t;
    }

    // 4. Montagem das Seções de Texto
    const secoes = [
        { t: "Dia de Nascimento", n: dados.resultados.diaN, txt: dados.textos.dia },
        { t: "Motivação", n: dados.resultados.motivacao, txt: dados.textos.motivacao },
        { t: "Influência (Aparência)", n: dados.resultados.influencia, txt: dados.textos.influencia },
        { t: "Expressão (Personalidade)", n: dados.resultados.personalidade, txt: dados.textos.expressao },
        { t: "Caminho de Vida (Destino)", n: dados.resultados.caminhoVida, txt: dados.textos.destino },
        { t: "Ano Pessoal", n: dados.resultados.anoPessoal, txt: dados.textos.anoPessoal },
        { t: "Primeiro Ciclo de Vida", n: dados.periodos.ciclo1, txt: dados.textos.ciclo1 },
        { t: "Segundo Ciclo de Vida", n: dados.periodos.ciclo2, txt: dados.textos.ciclo2 },
        { t: "Terceiro Ciclo de Vida", n: dados.periodos.ciclo3, txt: dados.textos.ciclo3 },
        { t: "Momentos Decisivos", n: "Ciclos de Destino", txt: `
            <strong>1º Momento (${dados.periodos.md1}):</strong> ${dados.textos.md1}<br><br>
            <strong>2º Momento (${dados.periodos.md2}):</strong> ${dados.textos.md2}<br><br>
            <strong>3º Momento (${dados.periodos.md3}):</strong> ${dados.textos.md3}<br><br>
            <strong>4º Momento (${dados.periodos.md4}):</strong> ${dados.textos.md4}
        `},
        { t: "Desafios de Vida", n: "Superação", txt: `
            <strong>Desafio 1:</strong> ${dados.textos.d1}<br><br>
            <strong>Desafio 2:</strong> ${dados.textos.d2}<br><br>
            <strong>Desafio Final:</strong> ${dados.textos.d3}
        `},
        { t: "Fraquezas e Lições Cármicas", n: "Atenção", txt: dados.textos.deficiencias }
    ];

    let htmlFinal = "";
    secoes.forEach(s => {
        htmlFinal += `
            <div class="secao">
                <h2>${s.t}</h2>
                <div class="numero-destaque">Vibração: ${s.n}</div>
                <div class="texto-conteudo">${formatarTexto(s.txt)}</div>
            </div>
        `;
    });

    document.getElementById("conteudo-dinamico").innerHTML = htmlFinal;
};

// Função para gerar o PDF
function baixarPDF() {
    const elemento = document.getElementById("folha-a4");
    const nomeArquivo = `Relatorio_Premium_${document.getElementById("label-nome").innerText}.pdf`;
    
    const opções = {
        margin: 10,
        filename: nomeArquivo,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opções).from(elemento).save();
}
</script>

</body>
</html>
