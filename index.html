/* Cor Especial para o Regente da Vida - FORMATO TRIÂNGULO */
.num.regente-destaque {
    background: none !important;
    color: #827108 !important;
    font-weight: 900 !important;
    border: none !important;
    box-shadow: none !important;
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;  /* Ajuste a largura se precisar */
    height: 40px; /* Ajuste a altura se precisar */
}

.num.regente-destaque::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    /* Aqui acontece a mágica do triângulo invertido */
    border-left: 22px solid transparent;  /* Lado esquerdo */
    border-right: 22px solid transparent; /* Lado direito */
    border-top: 38px solid #ffffff;       /* Fundo Branco do triângulo */
    filter: drop-shadow(0 0 5px rgba(184, 134, 11, 0.6)); /* Brilho dourado */
    z-index: -1;
}

/* Opcional: Se quiser uma bordinha fina no triângulo */
.num.regente-destaque::after {
    content: "";
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 24px solid transparent;
    border-right: 24px solid transparent;
    border-top: 41px solid #827108; /* Cor da "borda" dourada */
    z-index: -2;
}

@media print {
    /* 1. Criamos um "reset" para as capas de transição */
    .capa, .capa-transicao {
        page-break-before: always !important;
        page-break-after: always !important;
        /* Força a capa a ignorar as margens padrão do PDF para ocupar a folha toda */
        margin: 0 !important; 
        padding: 0 !important;
        height: 297mm !important;
    }

    /* 2. Removemos o cabeçalho/rodapé (incluindo numeração) nestas páginas específicas */
    /* Nota: Como o CSS padrão não permite selecionar @page por classe de elemento, 
       usamos o truque de esconder qualquer elemento que renderize a numeração 
       ou forçamos uma margem que "jogue" o número para fora se ele estiver no corpo. */

    .capa-transicao {
        /* Se você estiver usando um elemento HTML para simular a numeração, 
           garanta que ele tenha uma classe como '.numero-pagina' e use: */
        counter-increment: none !important; 
    }

    /* 3. A regra de ouro para PDFs modernos (Chrome/Edge):

function valorLetraMatriz(l){

function tratarNomeParaCalculo(nome) {

const particulas = [
    // Português e Espanhol
    'de', 'da', 'do', 'das', 'dos', 'del', 'de la', 'de las', 'de lo', 'de los', 'y', 'e',
    
    // Italiano (Muitas variações com apóstrofo)
    'di', 'da', 'degli', 'dei', 'de', 'dall', 'dalla', 'dallo', 'dai', 'dagli', 'delle', 'delli', 'lo', 'la',
    
    // Francês
    'du', 'des', 'le', 'la', 'l', 'de la', 'de l', 'd',

    'von', 'van', 'vander', 'vanden', 'vane', 'vom', 'zu', 'zur', 'zum', 'auf', 'der',
    
    // Inglês/Escocês/Irlandês (Aglutinados ou prefixos)

    // Árabe (Muito comum em nomes brasileiros de origem libanesa/síria)
    'al', 'el', 'bin', 'ben', 'abd'
];

    let nomeProcessado = nome.trim(); // Mantém as maiúsculas originais

    particulas.forEach(p => {
        // O segredo está na flag 'gi' da RegExp:
        // 'g' = global (todas as vezes que aparecer)
        // 'i' = insensitive (ignora se é maiúsculo ou minúsculo)
        const regexEspaco = new RegExp('\\b' + p + '\\s+', 'gi');
        
        // Usamos uma função no replace para manter a escrita original da partícula

        nomeProcessado = nomeProcessado.replace(regexEspaco, (match) => {

        });
    });

    return nomeProcessado;
}

function gerarPiramide(nome){

function detectarNegativas(linhas) {
    let detalhes = [];
    let pos = [];
    let numsSet = new Set();

    linhas.forEach((linha, i) => {
        let j = 0;
        while (j < linha.length) {
            let num = linha[j];
            let cont = 1;
            while (j + cont < linha.length && linha[j + cont] === num) { cont++; }

            if (cont >= 3) {
                numsSet.add(num);
                // Calcula o deslocamento (offset) para alinhar com as colunas do topo
                let offset = Math.floor(i / 2); 
                detalhes.push({
                    numero: num,
                    colunaInicio: j + offset,
                    repeticoes: cont,
                    linha: i
                });
                for (let k = j; k < j + cont; k++) pos.push({ l: i, c: k });
                j += cont;
            } else { j++; }
        }
    });
    return { pos, nums: [...numsSet], detalhes };
}

function detectarFinanceirasIndependentes(linhas) {
    let encontrados = [];

    for (let i = 0; i < linhas.length - 1; i++) {
        for (let j = 0; j < linhas[i].length - 1; j++) {
            
            // CONDIÇÃO REAL: Encontrou dois 99 lado a lado?
            if (linhas[i][j] === 9 && linhas[i][j + 1] === 9) {
                
                // Agora verifica se EXATAMENTE abaixo do primeiro 9 existe outro 9
                // Na pirâmide, o número abaixo de linhas[i][j] fica em linhas[i+1][j]
                if (linhas[i + 1][j] === 9) {
                    let offset = Math.floor(i / 2);
                    encontrados.push({
                        colunaInicio: j + offset,
                        repeticoes: 2, 
                        linha: i
                    });
                }
            }
        }
    }
    return encontrados;

 // Função Universal de Redução Numerológica
function calcularNumerologia(valor, aceitaMestre = true) {
    let num = parseInt(valor);
    
    // Se não for um número válido, retorna zero ou vazio
    if (isNaN(num)) return 0;

    while (num > 9) {
        // Se a regra permitir (aceitaMestre) e cair em 11, 22 ou 33, para aqui.
        if (aceitaMestre && (num === 11 || num === 22 || num === 33)) {
            break;
        }
        // Soma os dígitos
        num = String(num).split('').reduce((acc, curr) => acc + parseInt(curr), 0);
    }
    return num;
}     
        
 // 1. Função que soma a data dígito por dígito (Linear)
function calcularCVLinear(dia, mes, ano) {

function reduzirRespeitandoMestres(num) {

        function calcularValorLetra(letra) {
            const base = letra.normalize("NFD")[0].toUpperCase();
            const valorBase = tabela[base] || 0;
            if (!valorBase) return 0;
            let soma = 0, mult = 1, norm = letra.normalize("NFD");
            for (let i = 1; i < norm.length; i++) {
                const c = norm[i];
                if (c === "\u0301") soma += 2;      // Agudo
                else if (c === "\u0302") soma += 7; // Circunflexo
                else if (c === "\u0303") soma += 3; // Til
                else if (c === "\u0327") soma += 6; // Cedilha
                else if (c === "\u0300" || c === "\u0308") mult *= 2; // Grave/Trema
            }
            return (valorBase + soma) * mult;
        }

// Função para calcular o Desejo Oculto usando a SUA 'tabela' Cabalística
function calcularDesejoOculto(nome) {
    const contagem = {};
    // Limpa o nome e deixa em maiúsculo para bater com a sua const tabela
    const nomeLimpo = nome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    
    for (let letra of nomeLimpo) {
        if (tabela[letra]) { // AQUI: Usando o nome exato da sua constante
            const num = tabela[letra];
            contagem[num] = (contagem[num] || 0) + 1;
        }
    }
    
    let maxRepeticoes = 0;
    let numeroDesejo = 0;
    for (const n in contagem) {
        if (contagem[n] > maxRepeticoes) {
            maxRepeticoes = contagem[n];
            numeroDesejo = n;
        }
    }
    return { numero: numeroDesejo, qtd: maxRepeticoes };
}

// Função para Talentos Especiais (Baseado apenas no PRIMEIRO NOME)
function calcularTalentoEspecial(primeiroNome) {
    const contagem = {};
    const nomeLimpo = primeiroNome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    
    for (let letra of nomeLimpo) {
        if (tabela[letra]) { // AQUI: Usando o nome exato da sua constante
            const num = tabela[letra];
            contagem[num] = (contagem[num] || 0) + 1;
        }
    }
    
    const frequencias = Object.values(contagem).sort((a, b) => b - a);
    const maior = frequencias[0] || 0;
    const segundaMaior = frequencias[1] || 0;

    // Critério: aparece o dobro ou mais vezes que qualquer outro
    if (maior >= (segundaMaior * 2) && maior > 0) {
        return Object.keys(contagem).find(key => contagem[key] == maior);
    }
    return null;
}


        
function calcularIntensidadeAtributo(nums, resultados, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz, vibPlano, statusPlano, dominantePerfil, planoAtual,desejoOculto) {
    let nota = 5.5; 

    // MOTOR DE STATUS
    if (statusPlano === "forte") nota += 2.18; 
    else if (statusPlano === "medio") nota += 1.53;
    else if (statusPlano === "fraco") nota -= 2.13;

    // MODULAÇÃO POR PERFIL
    const perfil = (dominantePerfil || "neutro").toLowerCase();
    if (perfil === "criativo") nota += 1.33;
    else if (perfil === "neutro") nota += 1.25;
    else if (perfil === "indeciso") nota -= 1.23;

    // DNA E SOMBRAS
    let dnaPositivo = [
        resultados.motivacao, resultados.Personalidade, resultados.influencia, 
        resultados.comportamento, resultados.CaminhodeVida, resultados.Propósito, 
        resultados.subconsciente, resultados.dia, resultados.equilibrio, 
        resultados.talento, resultados.essencia,resultados.talentosEspeciais, regenteMatriz];
    
    let sombras = [resultados.deficitRecorrente, d3].concat(resultados.deficitsOcultos || [], negativasMatriz);

    // TABELA DE PONTOS (Normalizada internamente para evitar o erro de leitura)
    const tabelaPontos = {
        "fisico": { "criativo": [5], "indeciso": [6], "neutro": [4] },
        "mental": { "criativo": [1], "indeciso": [1, 5, 8], "neutro": [3] },
        "emocional": { "criativo": [1, 7, 2], "indeciso": [2, 3, 4, 6] },
        "intuitivo": { "criativo": [2], "indeciso": [6, 8, 1], "neutro": [3, 6] }
    };

    // Normaliza o nome do plano para minúsculo e sem acento para ler a tabela acima
    const planoBusca = planoAtual.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

    nums.forEach(n => {
        let pesoDNA = 0.8;
        
        // Verifica ressonância no perfil (Usando a chave normalizada)
        if (tabelaPontos[planoBusca] && tabelaPontos[planoBusca][perfil] && tabelaPontos[planoBusca][perfil].includes(n)) {
            nota += 1.0;
        }

        if (n === vibPlano && statusPlano !== "fraco") nota += 1.0;

        nota += (dnaPositivo.filter(num => num === n).length * pesoDNA);
        nota -= (sombras.filter(num => num === n).length * 1.5);
        
        if (faltantes.includes(n.toString()) || faltantes.includes(Number(n))) {
            nota -= 1.2;
        }
    });

    return Math.min(Math.max(nota, 1.78), 9.87);
}

    const desafioPrincipal = d3; // Aqui usamos o d3 que vem do parâmetro (sem redeclarar)
    
    // --- LÓGICA AUTOMÁTICA DE CICLOS POR IDADE ---
    let cicloAtivo, momentoAtivo, desafioTemporarioAtivo;

    if (idadeCronologica <= fim1) {
        // Fase 1
        cicloAtivo = res.ciclos[1];
        momentoAtivo = res.momentos[1];
        desafioTemporarioAtivo = res.desafios[1];
    } else if (idadeCronologica <= fim2) {
        // Fase 2
        cicloAtivo = res.ciclos[2];
        momentoAtivo = res.momentos[2]; 
        desafioTemporarioAtivo = res.desafios[2];
    } else {
        // Fase 3 (Maturidade)
        cicloAtivo = res.ciclos[3];
        momentoAtivo = res.momentos[4]; 
        desafioTemporarioAtivo = 0; 
    }

    configAtributo.nums.forEach(n => {
        // BÔNUS: Ativação pelo ANO PESSOAL
        if (n === anoP) nota += 0.35;

        // BÔNUS: Ciclo e Momento que o cliente vive HOJE (Automático)
        if (n === cicloAtivo) nota += 0.25;
        if (n === momentoAtivo) nota += 0.35;

        // ÔNUS: Desafio Principal (Aquele d3 que deu erro antes)
        if (n === desafioPrincipal) nota -= 0;

        // ÔNUS: Desafio Temporário da fase atual
        if (n === desafioTemporarioAtivo) nota -= 0.25;
    });

    // Mantém a nota entre 1.0 e 9.6 para o gráfico não quebrar
    return Math.min(Math.max(nota, 1.78), 9.87);
}

function gerarTodosOsGraficos(res, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz) {
    try {
        let rankingGeral = [];
        const dadosNaturais = calcularDadosPlanos(nomeRaw);
        const dominantePerfil = dadosNaturais.dominantePerfil || "neutro";
        
        const somasValores = [
            dadosNaturais.soma.fisico || 0,
            dadosNaturais.soma.mental || 0,
            dadosNaturais.soma.emocional || 0,
            dadosNaturais.soma.intuitivo || 0
        ];
        const ref = Math.max(...somasValores) || 1;

        const statusPlanos = {};
        const vibPlanos = {};

        const mapaChaves = {
            "Físico": "fisico", "Mental": "mental", "Emocional": "emocional", "Intuitivo": "intuitivo"
        };

        for (let label in mapaChaves) {
            let chaveSoma = mapaChaves[label];
            let valor = dadosNaturais.soma[chaveSoma] || 0;
            let r = valor / ref;
            statusPlanos[label] = (r > 0.75) ? "forte" : (r >= 0.50) ? "medio" : "fraco";
            vibPlanos[label] = reduzir(valor);
        }

        for (let nomeAtributo in megaBancoAtributos) {
            let config = megaBancoAtributos[nomeAtributo];
            let pAlvo = config.plano; 

            let statusRelativo = statusPlanos[pAlvo];
            let vibRelativa = vibPlanos[pAlvo];

            if (statusRelativo) {
                let notaFinal = calcularIntensidadeAtributo(
                    config.nums, res, faltantes, nomeRaw, d3, 
                    regenteMatriz, negativasMatriz, vibRelativa, 
                    statusRelativo, dominantePerfil, pAlvo
                );

                rankingGeral.push({
                    nome: nomeAtributo,
                    nota: notaFinal,
                    plano: pAlvo,
                    sub: config.sub,
                    percentual: (notaFinal * 10).toFixed(1)
                });
            }
        }       
        
        // 1. Começamos o HTML vazio para injetar o título no momento certo
        let htmlFinal = ""; 

        const ordemVisual = ["Físico", "Mental", "Emocional", "Intuitivo"].sort((a, b) => {
            const pesos = { "forte": 3, "medio": 2, "fraco": 1 };
            return (pesos[statusPlanos[b]] || 0) - (pesos[statusPlanos[a]] || 0);
        });

        const legendas = { "Físico": "Físico", "Emocional": "Emocional", "Intuitivo": "Intuitivo", "Mental": "Mental" };

        ordemVisual.forEach((p, index) => {
            const status = statusPlanos[p];
            const cor = status === "forte" ? "#827108" : (status === "medio" ? "#555" : "#cc0000");

            // 2. Abertura do Card com 'break-inside: avoid' para não separar o título do conteúdo
            htmlFinal += `
                <div style="margin-top: 20px; margin-bottom: 30px; break-inside: avoid; border: 1px solid #ffffff; padding: 25px; border-radius: 12px; background: #fff;">
            `;

            // 3. INJEÇÃO DO TÍTULO: Apenas no primeiro item do ranking (index 0)
            if (index === 0) {
                htmlFinal += `
                    <div style="text-align:center; border-bottom: 1px solid #fff; margin-bottom: 25px; padding-bottom: 10px;">
                        <h2 style="color:#000000; margin:10px 0 15px 0; text-transform:uppercase; letter-spacing:2px; font-weight:bold; font-size: 20px;">
                            Indicador de Potenciais de Nascimento (Permanente)
                        </h2>
                    </div>
                `;
            }

            // 4. Cabeçalho do Plano (Físico, Mental, etc.)
            htmlFinal += `
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid ${cor}; padding-bottom: 12px; margin-bottom: 20px;">
                        <h2 style="margin:0; color:${cor}; text-transform:uppercase; font-size:20px; font-weight:bold;">${legendas[p]}</h2>
                        <span style="font-size:16px; font-weight:bold; background:${cor}; color:#fff; padding:4px 14px; border-radius:20px; text-transform:uppercase;">${status}</span>
                    </div>
            `;

            const atributos = rankingGeral.filter(item => item.plano === p);
            const subgrupos = [...new Set(atributos.map(item => item.sub))];

            subgrupos.forEach(sub => {
                htmlFinal += `<div style="margin-bottom: 40px; padding-top: 20px; break-inside: avoid; page-break-inside: avoid;">`;
                htmlFinal += `<h4 style="color:#000000; font-size:18px; text-align:center; text-transform:uppercase; margin: 0 0 25px 0; padding-left: 10px; font-family: sans-serif;">${sub}</h4>`;
                
                atributos.filter(item => item.sub === sub).sort((a,b) => b.nota - a.nota).forEach(item => {
                    htmlFinal += montarBarraGrafico(item);
                });

                htmlFinal += `</div>`; 
            });

            htmlFinal += `</div>`; // Fecha o card do plano
        });

        return htmlFinal;

    } catch (e) {
        console.error("Erro Final:", e);
        return `<div style="color:red;">Erro ao processar gráficos.</div>`;
    }
}

function calcularDadosPlanos(nome) {
    let soma = { fisico: 0, mental: 0, emocional: 0, intuitivo: 0 };
    let contPerfil = { criativo: 0, indeciso: 0, neutro: 0 };
    
    for(let l of nome.toUpperCase()) {
        let letraBase = l.normalize("NFD")[0];
        let valor = calcularValorLetra(l);
        for(let p in gruposPlanos) {
            if(gruposPlanos[p].includes(letraBase)) {
                soma[p] += valor;
                break;
            }
        }
        if (tabelaExpressao[letraBase]) contPerfil[tabelaExpressao[letraBase]]++;
    }
    
    // Cria o ranking de potências (do maior para o menor)
    const ranking = Object.entries(soma).sort((a, b) => b[1] - a[1]);
    
    return { 
        soma, 
        maior: ranking[0][1], 
        contPerfil, 
        dominantePerfil: Object.keys(contPerfil).reduce((a, b) => contPerfil[a] >= contPerfil[b] ? a : b),
        forcaPrincipal: ranking[0][0], // O plano com mais pontos
        desafioAtual: ranking[3][0]    // O plano com menos pontos
    };
}

function calcularAptidaoProfissional(res) {
    // 1. Definição do número principal (usamos o Dia para o lado prático)
    const pilarPrincipal = reduzirPuro(res.dia);
    const pilares = [
        pilarPrincipal, 
        res.CaminhodeVida, 
        res.Propósito, 
        res.Personalidade
    ];
    
    let contagem = {};

    // 2. Mapeia a frequência de cada área (Lógica das Áreas de Atuação)
    pilares.forEach(num => {
        const areas = bancoAreasAtuacao[num] || [];
        areas.forEach(area => {
            contagem[area] = (contagem[area] || 0) + 1;
        });
    });

    let areasOrdenadas = Object.keys(contagem).map(area => {
        return { nome: area, pontos: contagem[area] };
    });

    // Ordenação Decrescente
    areasOrdenadas.sort((a, b) => b.pontos - a.pontos);

    // 3. CRIAÇÃO DAS VARIÁVEIS (O que estava faltando)
    let vocacaoMaster = areasOrdenadas.slice(0, 18).map(item => item.nome);

    return `

function analisarAptidaoPremium(res) {
    const pilares = [
        reduzirPuro(res.dia), 
        res.CaminhodeVida, 
        res.Propósito, 
        res.Personalidade
    ];

    let contagemAreas = {};

    pilares.forEach(num => {
        const areas = bancoAreasAtuacao[num] || [];
        areas.forEach(area => {
            contagemAreas[area] = (contagemAreas[area] || 0) + 1;
        });
    });

    // Filtramos áreas com 3+ (Vocação Master) e 2 (Afinidade)
    let vocacaoMaster = Object.keys(contagemAreas).filter(a => contagemAreas[a] >= 3);
    let afinidade = Object.keys(contagemAreas).filter(a => contagemAreas[a] === 2);

    return { vocacaoMaster, afinidade };
}


function formatarProfissoesSimples(res) {
    // Chamamos a análise que você já tem
    const dados = analisarAptidaoPremium(res);
    
    // Tentamos pegar a Vocação Master (3+ pontos), 
    // se estiver vazia, pegamos a Afinidade (2 pontos)
    let listaParaExibir = dados.vocacaoMaster.length > 0 
        ? dados.vocacaoMaster 
        : dados.afinidade;

    // Se ainda assim não tiver nada, pegamos as primeiras áreas do banco
    if (listaParaExibir.length === 0) {
        listaParaExibir = ["Consultoria", "Gestão"]; 
    }

    // Pegamos apenas as 2 primeiras para não espremer o layout
    const textoFinal = listaParaExibir.slice(0, 2).join(" • ");

    // Retornamos com um span para diminuir o tamanho da letra
    return `<span style="font-size: 0.75rem; line-height: 1.1; display: block;">${textoFinal}</span>`;
}

function gerarCronogramaMensal(valorAnoPessoal, mesNascimento) {
    if (!valorAnoPessoal || !mesNascimento) {
        return "<p style='color:#666; text-align:center;'>Dados não localizados.</p>";
    }

    const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    let htmlGerado = "";
    
    let anoBase = parseInt(valorAnoPessoal);
    let mesPartida = parseInt(mesNascimento) - 1; 

    for (let i = 0; i < 12; i++) {
        let indexMes = (mesPartida + i) % 12;
        let nomeMes = nomesMeses[indexMes];
        let numeroMesCivil = indexMes + 1;

        let numMP = anoBase + numeroMesCivil;
        while (numMP > 9 && numMP !== 11 && numMP !== 22) {
            numMP = String(numMP).split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
        }

        const dados = bancoMesPessoal[numMP];

        if (dados) {
            htmlGerado += `
            <div style="margin-bottom: 25px; border: 1px solid #d4af37; background: #fff; page-break-inside: avoid; border-radius: 8px; overflow: hidden;">
            
                <div style="background: #1a1a1a; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;">
               
                    <strong style="color: #d4af37; text-transform: uppercase;">${nomeMes}</strong>
                    <span style="background: #d4af37; color: #1a1a1a; padding: 2px 10px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;">MÊS PESSOAL ${numMP}</span>
                </div>
                
                <div style="padding: 15px; font-size: 1.2rem; line-height: 1.5; color: #333;">
                    <p style="color: #b8860b; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px;">${dados.titulo}</p>
                    
                    <p style="margin-bottom: 8px;"><strong>👤 Pessoal:</strong> ${dados.pessoal}</p>
                    
                    <p style="margin-bottom: 8px;"><strong>❤️ Afetivo:</strong> ${dados.afetivo}</p>
                    
                    <p style="margin-bottom: 8px;"><strong>💼 Profissional:</strong> ${dados.profissional}</p>
                    
                    <div style="margin-top: 10px; padding: 10px; background: #fdf8e6; border-left: 4px solid #a94442;">
                        <strong style="color: #a94442;">⚠️ Atenção:</strong> ${dados.orientacoes}
                    </div>
                </div>
            </div>`;
        }
    }
    return htmlGerado;
}

function formatarNomeExibicao(nomeDigitado) {
    // Esta função coloca um espaço antes de qualquer letra maiúscula 
    // que esteja "grudada" em outra, exceto no início.
    // Ex: "DeSouza" -> "De Souza" | "Vanderlei" -> "Vanderlei" (permanece igual)
    
    return nomeDigitado.replace(/([a-z])([A-Z])/g, '$1 $2');
}

function calcularNumerosSocial(nome) {
    const tabelaBase = {
        'A': 1, 'B': 2, 'C': 3, 'D': 4, 'E': 5, 'F': 8, 'G': 3, 'H': 5,
        'I': 1, 'J': 1, 'K': 2, 'L': 3, 'M': 4, 'N': 5, 'O': 7, 'P': 8,
        'Q': 1, 'R': 2, 'S': 3, 'T': 4, 'U': 6, 'V': 6, 'W': 6, 'X': 6,
        'Y': 1, 'Z': 7
    };

    let totalMotivacao = 0; // Vogais
    let totalInfluencia = 0; // Consoantes
    
    const vogais = "AEIOUYÁÉÍÓÚÂÊÎÔÛÃÕÀÈÌÒÙÄËÏÖÜ";
    const nomeLimpo = nome.trim().toUpperCase();

    // Divide o nome em palavras para tratar cada letra e seus acentos
    for (let char of nomeLimpo) {
        if (char === " ") continue;

        let valorLetra = 0;
        let base = char.normalize("NFD")[0]; // Pega a letra sem acento
        
        if (tabelaBase[base]) {
            valorLetra = tabelaBase[base];

            // --- LÓGICA DE MODIFICADORES CABALÍSTICOS ---
            if (/[ÁÉÍÓÚ]/.test(char)) valorLetra += 2;
            if (/[ÃÕ]/.test(char)) valorLetra += 3;
            if (/[ÂÊÎÔÛ]/.test(char)) valorLetra += 7;
            if (char === "Ç") valorLetra += 6;
            if (/[ÀÈÌÒÙÄËÏÖÜ]/.test(char)) valorLetra *= 2; // Multiplicador (dobra)

            // Separação para Motivação e Influência
            if (vogais.includes(char)) {

    <p>Nesta lei, aprendemos que "toda causa tem seu efeito e todo efeito tem sua causa". Não existe o acaso; existem apenas leis que ainda não compreendemos. Para o indivíduo, esta é a ferramenta definitiva de autorresponsabilidade. Ao analisar os resultados atuais de sua vida (os efeitos), você pode rastrear as ações e pensamentos que os geraram (as causas). Para mudar o futuro, deve-se plantar novas causas no presente. Educar-se nesta lei é sair da posição de vítima das circunstâncias e assumir o papel de mestre, agindo com consciência e intenção em cada escolha, sabendo que cada ação é uma semente que invariavelmente dará frutos.</p>
<br>
    <h3>7. Lei de Gênero</h3><br>
    <p>A Lei de Gênero afirma que "o gênero está em tudo; tudo tem seus princípios masculino e feminino". Esta lei não se refere apenas ao sexo biológico, mas às energias de geração e criação. O princípio masculino representa a vontade, a ação e a semente; o princípio feminino representa a intuição, a gestação e a sabedoria. Para usar isso como ferramenta, a pessoa deve equilibrar essas forças dentro de si: ter a iniciativa para começar (masculino) e a paciência para nutrir e deixar a ideia crescer (feminino). A criação equilibrada ocorre quando a mente lógica e a intuição trabalham juntas, permitindo que os projetos e sonhos se manifestem de forma completa e harmoniosa.</p>
