        const tabela = { A:1, J:1, I:1, Q:1, Y:1, B:2, K:2, R:2, C:3, G:3, L:3, S:3, D:4, M:4, T:4, E:5, H:5, N:5, U:6, V:6, W:6, X:6, Ç:6, O:7, Z:7, F:8, P:8 };

    };
const mapaMatriz = { A:1,I:1,Q:1,J:1,Y:1, B:2,K:2,R:2, C:3,G:3,L:3,S:3, D:4,M:4,T:4, E:5,H:5,N:5, U:6,V:6,W:6,X:6,Ç:6, O:7,Z:7, F:8,P:8 };

    'E':'criativo','W':'indeciso','D':'neutro','M':'neutro',

};

const gruposPlanos = {

    intuitivo: ["K","F","Q","U","Y","C","V"] 
};

function valorLetraMatriz(l){
    let n = l.normalize("NFD");
    let v = mapaMatriz[n[0].toUpperCase()] ?? 0;
    let s = 0;
    if(n.includes("\u0301")) s=2; else if(n.includes("\u0302")) s=7; else if(n.includes("\u0303")) s=3; else if(n.includes("\u0327")) s=6;
    return (v + s) * (n.includes("\u0300") || n.includes("\u0308") ? 2 : 1);
}
        
function mascaraData(campo) {
    let v = campo.value.replace(/\D/g, ""); // Remove tudo que não é número
    if (v.length > 8) v = v.substring(0, 8);
    
    // Adiciona as barras conforme digita
    if (v.length > 2 && v.length <= 4) {
        v = v.replace(/^(\d{2})(\d)/, "$1/$2");
    } else if (v.length > 4) {
        v = v.replace(/^(\d{2})(\d{2})(\d)/, "$1/$2/$3");
    }
    campo.value = v;
}


  // Função de Redução Pura (Para usar onde NÃO pode ter 11/22/33)
function reduzirPuro(n) {
    let num = Number(n);
    while (num > 9) {
        num = num.toString().split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
    }
    return num;
}
       
function gerarPiramide(nome){
    let base = [];
    for(let l of nome.toUpperCase()){ if(l !== " "){ let v = valorLetraMatriz(l); if(v) base.push(v); } }
    let linhas = [base];
    while(base.length > 1){
        let nova = [];
        for(let i=0; i<base.length-1; i++){
            let soma = base[i] + base[i+1];
            while(soma > 9) soma = soma.toString().split('').reduce((a,b)=>+a + +b, 0);
            nova.push(soma);
        }
        linhas.push(nova);
        base = nova;
    }
    return linhas;
}

// Adicione esta função para o código saber agrupar os números de 2 em 2
function topo(base) {
    let arcanos = [];
    for (let i = 0; i < base.length - 1; i++) {
        arcanos.push(parseInt("" + base[i] + base[i + 1]));
    }
    return arcanos;
}        

function detectarNegativas(linhas) {
    let detalhes = [];
    let pos = [];
    let numsSet = new Set();

    linhas.forEach((linha, i) => {
        let j = 0;
        while (j < linha.length) {
            let num = linha[j];
            let cont = 1;
            while (j + cont < linha.length && linha[j + cont] === num) { cont++; }

            if (cont >= 3) {
                numsSet.add(num);
                // Calcula o deslocamento (offset) para alinhar com as colunas do topo
                let offset = Math.floor(i / 2); 
                detalhes.push({
                    numero: num,
                    colunaInicio: j + offset,
                    repeticoes: cont,
                    linha: i
                });
                for (let k = j; k < j + cont; k++) pos.push({ l: i, c: k });
                j += cont;
            } else { j++; }
        }
    });
    return { pos, nums: [...numsSet], detalhes };
}

function calcularDatasVigenciaNegativa(dataNascStr, idadeInicio, duracaoTotal) {
    let partes = dataNascStr.split("/");
    // Assume formato DD/MM/AAAA do seu input atual
    let dataBase = new Date(parseInt(partes[2]), parseInt(partes[1]) - 1, parseInt(partes[0]));

    let dataIni = new Date(dataBase);
    dataIni.setFullYear(dataIni.getFullYear() + idadeInicio);
    
    let dataFim = new Date(dataIni);
    dataFim.setFullYear(dataFim.getFullYear() + duracaoTotal);

    return {
        ini: dataIni.toLocaleDateString('pt-BR'),
        fim: dataFim.toLocaleDateString('pt-BR')
    };
}

 // Função Universal de Redução Numerológica
function calcularNumerologia(valor, aceitaMestre = true) {
    let num = parseInt(valor);
    
    // Se não for um número válido, retorna zero ou vazio
    if (isNaN(num)) return 0;

    while (num > 9) {
        // Se a regra permitir (aceitaMestre) e cair em 11, 22 ou 33, para aqui.
        if (aceitaMestre && (num === 11 || num === 22 || num === 33)) {
            break;
        }
        // Soma os dígitos
        num = String(num).split('').reduce((acc, curr) => acc + parseInt(curr), 0);
    }
    return num;
}     
        
 // 1. Função que soma a data dígito por dígito (Linear)
function calcularCVLinear(dia, mes, ano) {
    let dataCompleta = dia.toString() + mes.toString() + ano.toString();
    let somaTotal = 0;
    for (let i = 0; i < dataCompleta.length; i++) {
        let digito = parseInt(dataCompleta[i]);
        if (!isNaN(digito)) somaTotal += digito;
    }
    return reduzirRespeitandoMestres(somaTotal);
}

// 2. Função de redução que para no 11, 22 e 33
function reduzirRespeitandoMestres(num) {
    while (num > 9 && num !== 11 && num !== 22 && num !== 33) {
        num = num.toString().split('').reduce((acc, curr) => acc + parseInt(curr), 0);
    }
    return num;
}
        
    function reduzir(n) {
    if (!n || n === 0) return 0;
    
    // Converte para string e remove sinais ou pontos
    let num = n.toString().replace(/\D/g, "");
    
    // Enquanto o número for maior que 9 e NÃO for um Número Mestre (11, 22)
    // Se você NÃO quiser usar números mestres, remova: && num != "11" && num != "22"
    while (num.length > 1 && num !== "11" && num !== "22") {
        num = num.split("")
                 .reduce((acc, curr) => acc + parseInt(curr), 0)
                 .toString();
    }
    
    return parseInt(num);
}

        function calcularValorLetra(letra) {
            const base = letra.normalize("NFD")[0].toUpperCase();
            const valorBase = tabela[base] || 0;
            if (!valorBase) return 0;
            let soma = 0, mult = 1, norm = letra.normalize("NFD");
            for (let i = 1; i < norm.length; i++) {
                const c = norm[i];
                if (c === "\u0301") soma += 2;      // Agudo
                else if (c === "\u0302") soma += 7; // Circunflexo
                else if (c === "\u0303") soma += 3; // Til
                else if (c === "\u0327") soma += 6; // Cedilha
                else if (c === "\u0300" || c === "\u0308") mult *= 2; // Grave/Trema
            }
            return (valorBase + soma) * mult;
        }

function aplicarFiltroTexto(texto) {

// Função para calcular o Desejo Oculto usando a SUA 'tabela' Cabalística
function calcularDesejoOculto(nome) {
    const contagem = {};
    // Limpa o nome e deixa em maiúsculo para bater com a sua const tabela
    const nomeLimpo = nome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    
    for (let letra of nomeLimpo) {
        if (tabela[letra]) { // AQUI: Usando o nome exato da sua constante
            const num = tabela[letra];
            contagem[num] = (contagem[num] || 0) + 1;
        }
    }
    
    let maxRepeticoes = 0;
    let numeroDesejo = 0;
    for (const n in contagem) {
        if (contagem[n] > maxRepeticoes) {
            maxRepeticoes = contagem[n];
            numeroDesejo = n;
        }
    }
    return { numero: numeroDesejo, qtd: maxRepeticoes };
}

// Função para Talentos Especiais (Baseado apenas no PRIMEIRO NOME)
function calcularTalentoEspecial(primeiroNome) {
    const contagem = {};
    const nomeLimpo = primeiroNome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    
    for (let letra of nomeLimpo) {
        if (tabela[letra]) { // AQUI: Usando o nome exato da sua constante
            const num = tabela[letra];
            contagem[num] = (contagem[num] || 0) + 1;
        }
    }
    
    const frequencias = Object.values(contagem).sort((a, b) => b - a);
    const maior = frequencias[0] || 0;
    const segundaMaior = frequencias[1] || 0;

    // Critério: aparece o dobro ou mais vezes que qualquer outro
    if (maior >= (segundaMaior * 2) && maior > 0) {
        return Object.keys(contagem).find(key => contagem[key] == maior);
    }
    return null;
}


        
function calcularIntensidadeAtributo(nums, resultados, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz, vibPlano, statusPlano, dominantePerfil, planoAtual,desejoOculto) {
    let nota = 5.5; 

    // MOTOR DE STATUS
    if (statusPlano === "forte") nota += 2.1; 
    else if (statusPlano === "medio") nota += 1.5;
    else if (statusPlano === "fraco") nota -= 2.1;

    // MODULAÇÃO POR PERFIL
    const perfil = (dominantePerfil || "neutro").toLowerCase();
    if (perfil === "criativo") nota += 1.2;
    else if (perfil === "neutro") nota += 0.9;
    else if (perfil === "indeciso") nota -= 1.2;

    // DNA E SOMBRAS
    let dnaPositivo = [
        resultados.motivacao, resultados.Personalidade, resultados.influencia, 
        resultados.comportamento, resultados.CaminhodeVida, resultados.Propósito, 
        resultados.subconsciente, resultados.dia, resultados.equilibrio, 
        resultados.talento, resultados.essencia,resultados.talentosEspeciais, regenteMatriz];
    
    let sombras = [resultados.deficitRecorrente, d3].concat(resultados.deficitsOcultos || [], negativasMatriz);

    // TABELA DE PONTOS (Normalizada internamente para evitar o erro de leitura)
    const tabelaPontos = {
        "fisico": { "criativo": [5], "indeciso": [6], "neutro": [4] },
        "mental": { "criativo": [1], "indeciso": [1, 5, 8], "neutro": [3] },
        "emocional": { "criativo": [1, 7, 2], "indeciso": [2, 3, 4, 6] },
        "intuitivo": { "criativo": [2], "indeciso": [6, 8, 1], "neutro": [3, 6] }
    };

    // Normaliza o nome do plano para minúsculo e sem acento para ler a tabela acima
    const planoBusca = planoAtual.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

    nums.forEach(n => {
        let pesoDNA = 0.8;
        
        // Verifica ressonância no perfil (Usando a chave normalizada)
        if (tabelaPontos[planoBusca] && tabelaPontos[planoBusca][perfil] && tabelaPontos[planoBusca][perfil].includes(n)) {
            nota += 1.0;
        }

        if (n === vibPlano && statusPlano !== "fraco") nota += 1.0;

        nota += (dnaPositivo.filter(num => num === n).length * pesoDNA);
        nota -= (sombras.filter(num => num === n).length * 1.5);
        
        if (faltantes.includes(n.toString()) || faltantes.includes(Number(n))) {
            nota -= 1.2;
        }
    });

    return Math.min(Math.max(nota, 1.7), 9.6);
}
// --- NOVO MOTOR DE GRÁFICOS DINÂMICOS (PLANOS DE EXPRESSÃO) ---

function calcularIntensidadeMomento(configAtributo, res, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz, vibPlano, statusPlano, dominantePerfil, planoAtual, idadeCronologica, fim1, fim2) {
    
    // 1. NOTA BASE (O que ele trouxe ao nascer)
    let nota = calcularIntensidadeAtributo(configAtributo.nums, res, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz, vibPlano, statusPlano, dominantePerfil, planoAtual);

    // 2. MODIFICADORES DE TEMPO (O "CLIMA" ATUAL)
    const anoP = res.anoPessoal;
    const desafioPrincipal = d3; // Aqui usamos o d3 que vem do parâmetro (sem redeclarar)
    
    // --- LÓGICA AUTOMÁTICA DE CICLOS POR IDADE ---
    let cicloAtivo, momentoAtivo, desafioTemporarioAtivo;

    if (idadeCronologica <= fim1) {
        // Fase 1
        cicloAtivo = res.ciclos[1];
        momentoAtivo = res.momentos[1];
        desafioTemporarioAtivo = res.desafios[1];
    } else if (idadeCronologica <= fim2) {
        // Fase 2
        cicloAtivo = res.ciclos[2];
        momentoAtivo = res.momentos[2]; 
        desafioTemporarioAtivo = res.desafios[2];
    } else {
        // Fase 3 (Maturidade)
        cicloAtivo = res.ciclos[3];
        momentoAtivo = res.momentos[4]; 
        desafioTemporarioAtivo = 0; 
    }

    configAtributo.nums.forEach(n => {
        // BÔNUS: Ativação pelo ANO PESSOAL
        if (n === anoP) nota += 1.5;

        // BÔNUS: Ciclo e Momento que o cliente vive HOJE (Automático)
        if (n === cicloAtivo) nota += 1.3;
        if (n === momentoAtivo) nota += 1.5;

        // ÔNUS: Desafio Principal (Aquele d3 que deu erro antes)
        if (n === desafioPrincipal) nota -= 1.5;

        // ÔNUS: Desafio Temporário da fase atual
        if (n === desafioTemporarioAtivo) nota -= 1.5;
    });

    // Mantém a nota entre 1.0 e 9.6 para o gráfico não quebrar
    return Math.min(Math.max(nota, 1.7), 9.6);
}

function gerarTodosOsGraficos(res, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz) {
    try {
        let rankingGeral = [];
        const dadosNaturais = calcularDadosPlanos(nomeRaw);
        const dominantePerfil = dadosNaturais.dominantePerfil || "neutro";
        
        const somasValores = [
            dadosNaturais.soma.fisico || 0,
            dadosNaturais.soma.mental || 0,
            dadosNaturais.soma.emocional || 0,
            dadosNaturais.soma.intuitivo || 0
        ];
        const ref = Math.max(...somasValores) || 1;

        const statusPlanos = {};
        const vibPlanos = {};

        const mapaChaves = {
            "Físico": "fisico", "Mental": "mental", "Emocional": "emocional", "Intuitivo": "intuitivo"
        };

        for (let label in mapaChaves) {
            let chaveSoma = mapaChaves[label];
            let valor = dadosNaturais.soma[chaveSoma] || 0;
            let r = valor / ref;
            statusPlanos[label] = (r > 0.75) ? "forte" : (r >= 0.50) ? "medio" : "fraco";
            vibPlanos[label] = reduzir(valor);
        }

        for (let nomeAtributo in megaBancoAtributos) {
            let config = megaBancoAtributos[nomeAtributo];
            let pAlvo = config.plano; 

            let statusRelativo = statusPlanos[pAlvo];
            let vibRelativa = vibPlanos[pAlvo];

            if (statusRelativo) {
                let notaFinal = calcularIntensidadeAtributo(
                    config.nums, res, faltantes, nomeRaw, d3, 
                    regenteMatriz, negativasMatriz, vibRelativa, 
                    statusRelativo, dominantePerfil, pAlvo
                );

                rankingGeral.push({
                    nome: nomeAtributo,
                    nota: notaFinal,
                    plano: pAlvo,
                    sub: config.sub,
                    percentual: (notaFinal * 10).toFixed(1)
                });
            }
        }       
        
        // 1. Começamos o HTML vazio para injetar o título no momento certo
        let htmlFinal = ""; 

        const ordemVisual = ["Físico", "Mental", "Emocional", "Intuitivo"].sort((a, b) => {
            const pesos = { "forte": 3, "medio": 2, "fraco": 1 };
            return (pesos[statusPlanos[b]] || 0) - (pesos[statusPlanos[a]] || 0);
        });

        const legendas = { "Físico": "Físico", "Emocional": "Emocional", "Intuitivo": "Intuitivo", "Mental": "Mental" };

        ordemVisual.forEach((p, index) => {
            const status = statusPlanos[p];
            const cor = status === "forte" ? "#827108" : (status === "medio" ? "#555" : "#cc0000");

            // 2. Abertura do Card com 'break-inside: avoid' para não separar o título do conteúdo
            htmlFinal += `
                <div style="margin-top: 20px; margin-bottom: 30px; break-inside: avoid; border: 1px solid #e0e0e0; padding: 25px; border-radius: 12px; background: #fff;">
            `;

            // 3. INJEÇÃO DO TÍTULO: Apenas no primeiro item do ranking (index 0)
            if (index === 0) {
                htmlFinal += `
                    <div style="text-align:center; border-bottom: 1px solid #eee; margin-bottom: 25px; padding-bottom: 10px;">
                        <h2 style="color:#000000; margin:10px 0 15px 0; text-transform:uppercase; letter-spacing:2px; font-weight:bold; font-size: 20px;">
                            Indicador de Potenciais de Nascimento (Permanente)
                        </h2>
                    </div>
                `;
            }

            // 4. Cabeçalho do Plano (Físico, Mental, etc.)
            htmlFinal += `
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid ${cor}; padding-bottom: 12px; margin-bottom: 20px;">
                        <h2 style="margin:0; color:${cor}; text-transform:uppercase; font-size:20px; font-weight:bold;">${legendas[p]}</h2>
                        <span style="font-size:16px; font-weight:bold; background:${cor}; color:#fff; padding:4px 14px; border-radius:20px; text-transform:uppercase;">${status}</span>
                    </div>
            `;

            const atributos = rankingGeral.filter(item => item.plano === p);
            const subgrupos = [...new Set(atributos.map(item => item.sub))];

            subgrupos.forEach(sub => {
                htmlFinal += `<div style="margin-bottom: 40px; padding-top: 20px; break-inside: avoid; page-break-inside: avoid;">`;
                htmlFinal += `<h4 style="color:#000000; font-size:18px; text-align:center; text-transform:uppercase; margin: 0 0 25px 0; padding-left: 10px; font-family: sans-serif;">${sub}</h4>`;
                
                atributos.filter(item => item.sub === sub).sort((a,b) => b.nota - a.nota).forEach(item => {
                    htmlFinal += montarBarraGrafico(item);
                });

                htmlFinal += `</div>`; 
            });

            htmlFinal += `</div>`; // Fecha o card do plano
        });

        return htmlFinal;

    } catch (e) {
        console.error("Erro Final:", e);
        return `<div style="color:red;">Erro ao processar gráficos.</div>`;
    }
}

    let contPerfil = { criativo: 0, indeciso: 0, neutro: 0 };
    
    for(let l of nome.toUpperCase()) {

        let valor = calcularValorLetra(l);

        if (tabelaExpressao[letraBase]) contPerfil[tabelaExpressao[letraBase]]++;
