function reduzir(n) {
  if (n === 0) return 0;
  n = Math.abs(n);
  let r = n % 9;
  return r === 0 ? 9 : r;
}

function calcularValorComAcentos(letra) {
  const base = letra.normalize("NFD")[0];
  const valorBase = tabela[base];
  if (!valorBase) return 0;
  let soma = 0, mult = 1;
  const normalizada = letra.normalize("NFD");
  for (let i = 1; i < normalizada.length; i++) {
    const c = normalizada[i];
    if (c === "\u0301") soma += 2; 
    else if (c === "\u0302") soma += 7;
    else if (c === "\u0303") soma += 3; 
    else if (c === "\u0327") soma += 6;
    else if (c === "\u0300" || c === "\u0308") mult *= 2;
  }
  return (valorBase + soma) * mult;
}

function aplicarFiltroTexto(texto) {
    if (!texto) return "";
    let nomeInput = document.getElementById("nome").value.trim();
    let pNome = nomeInput.split(' ')[0] || "você";
    return texto.replace(/você/gi, `<strong>${pNome}</strong>`);
}

function card(titulo, subtitulo, numero, textoRaw) {
  return `<div class="card"><h3>${titulo}</h3><p><strong>${subtitulo}</strong> | Número: ${numero}</p><div class="texto">${aplicarFiltroTexto(textoRaw)}</div></div>`;
}

function calcularIntensidadeAtributo(numerosAlvo, resultados, faltantes, desafios, nome) {
    let intensidade = 0;
    const nomeLimpo = nome.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    numerosAlvo.forEach(num => {
        if (resultados.motivacao === num) intensidade += 3.5;
        if (resultados.personalidade === num) intensidade += 3.5;
        if (resultados.influencia === num) intensidade += 2.0;
        if (resultados.diaN === num) intensidade += 2.5;
        if (resultados.comportamento === num) intensidade += 2.0;
        for (let letra of nomeLimpo) { if (tabela[letra] === num) intensidade += 0.4; }
        if (faltantes.includes(num)) intensidade -= 3.0;
        if (desafios.includes(num)) intensidade -= 1.5;
    });
    return Math.max(0, Math.min(10, intensidade)).toFixed(1);
}

// Dentro da função gerarGraficosIntensidade, mude o loop para:

function gerarGraficosIntensidade(resultados, faltantes, desafios, nomeCompleto) {
    let rankingGeral = [];
    
    // 1. Processa as notas de todas as legendas do banco
    for (let legenda in bancoLegendasCompleto) {
        const dados = bancoLegendasCompleto[legenda];
        const nota = calcularIntensidadeAtributo(dados.nums, resultados, faltantes, desafios, nomeCompleto);
        rankingGeral.push({ nome: legenda, nota: parseFloat(nota), categoria: dados.cat });
    }

    // 2. Ordena do maior para o menor para definir o ranking
    rankingGeral.sort((a, b) => b.nota - a.nota);
    const instintoSuperior = rankingGeral[0];

    const categorias = ["Realização", "Mentalidade", "Social", "Essência", "Evolução"];
    
    // 3. HEADER DE IMPACTO (Instinto Superior)
    let html = `
        <div class="card" style="background: #0a0e1a; color: #d4af37; border: 2px solid #d4af37; text-align:center; padding: 25px; margin-bottom: 30px;">

            <p style="color: white; font-size: 13px; margin:0; opacity: 0.9;">Este é o seu Instinto Superior, a frequência que domina seu campo vibracional hoje.</p>
        </div>
    `;

    // 4. LOOP DAS CATEGORIAS (Mostrando os 3 melhores de cada pilar)
    categorias.forEach(cat => {
        const itensDaCat = rankingGeral.filter(item => item.categoria === cat).slice(0, 3);
        
        html += `
            <div class="card" style="border-top: 4px solid #d4af37; margin-bottom: 25px;">
                <h3 style="color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; border:none;">Análise do Pilar de ${cat}</h3>
        `;
        
        itensDaCat.forEach(item => {
            const porcento = item.nota * 10;
            html += `
                <div style="margin-bottom: 18px;">
                    <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; color: #111;">
                        <span>${item.nome}</span>
                        <span style="color: #d4af37;">${Math.round(porcento)}%</span>
                    </div>
                    <div style="height: 6px; background: #f0f0f0; border-radius: 10px; overflow: hidden; margin-top:6px;">
                        <div style="width: ${porcento}%; height: 100%; background: #d4af37; box-shadow: 0 0 10px rgba(212,175,55,0.2); transition: width 2s;"></div>
                    </div>
                </div>
            `;
        });
        
        html += `</div>`;
    });

    // 5. PONTOS DE ATENÇÃO (As 4 menores notas do ranking total)
    const pontosAtencao = rankingGeral.slice(-4).reverse();
    html += `
        <div class="card" style="background: #fff5f5; border: 1px solid #ffcccc; margin-top: 10px;">
            <h3 style="color: #c53030; margin-top:0; border:none; font-size: 16px;">⚠️ NECESSIDADES DE DESENVOLVIMENTO</h3>
            <p style="font-size: 12px; color: #9b2c2c; margin-bottom: 15px;">Frequências em baixa voltagem que precisam de atenção consciente:</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                ${pontosAtencao.map(item => `
                    <div style="background: white; padding: 10px; border-radius: 6px; border: 1px solid #fee2e2; font-size: 13px; font-weight: bold; color: #444; text-align:center;">
                        ${item.nome} <br>
                        <span style="color: #c53030; font-size: 11px;">${Math.round(item.nota * 10)}% de Potência</span>
                    </div>
                `).join("")}
            </div>
        </div>
    `;

    return html;
}
let mapaGerado = false;

function gerarMapa() {
  const nomeInput = document.getElementById("nome").value.trim();
  const dataInput = document.getElementById("data").value;
  if(nomeInput.length < 5 || !dataInput) { alert("Preencha nome completo e data."); return; }

  const [ano, mes, dia] = dataInput.split("-").map(Number);
  const nomeUp = nomeInput.toUpperCase();

  // 1. Cálculos Base de Nome
  let somaV = 0, somaC = 0, usados = new Set();
  for (let l of nomeUp) {
    const valor = calcularValorComAcentos(l);
    if (!valor) continue;
    const base = l.normalize("NFD")[0];
    const valTabela = tabela[base];
    if(valTabela) usados.add(valTabela);
    vogais.includes(base) ? somaV += valor : somaC += valor;
  }

  // 2. Montagem dos Resultados Principais
  const res = {
      diaN: dia,
      motivacao: reduzir(somaV),
      influencia: reduzir(somaC),
      personalidade: reduzir(somaV + somaC),
      comportamento: reduzir(dia),
      caminhoVida: reduzir(dia + mes + ano),
      anoPessoal: reduzir(dia + mes + new Date().getFullYear())
  };
  res.missao = reduzir(res.caminhoVida + res.personalidade);

  // 3. Faltantes e Desafios (Necessário para a Moderna e Gráficos)
  let faltantes = [];
  for (let i=1; i<=9; i++) if(!usados.has(i)) faltantes.push(i);

  const d1 = reduzir(Math.abs(dia - mes));
  const d2 = reduzir(Math.abs(dia - reduzir(ano)));
  const d3 = reduzir(Math.abs(d1 - d2));

  // 4. NUMEROLOGIA MODERNA
  let deficitPrincipal = reduzir(dia);
  let deficitsOcultos = [];
  const listaConferir = [res.missao, res.caminhoVida, res.personalidade, res.motivacao];
  for (let i = 0; i < listaConferir.length; i++) {
      for (let j = i + 1; j < listaConferir.length; j++) {
          if (listaConferir[i] === listaConferir[j]) deficitsOcultos.push(listaConferir[i]);
      }
  }
  let deficitsFinais = [...new Set([deficitPrincipal, ...deficitsOcultos])];

  let contagemLetras = {};
  let inclinacoes = [9];
  const nomeLimpo = nomeUp.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  for (let letra of nomeLimpo) {
      let num = tabela[letra];
      if (num) contagemLetras[num] = (contagemLetras[num] || 0) + 1;
  }
  for (let num in contagemLetras) {
      if (contagemLetras[num] >= 3 && num != 9) inclinacoes.push(Number(num));
  }

  let subconscienteNum = 9 - faltantes.length;

  let primeiroNome = nomeInput.split(' ')[0].toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  let contPN = {};
  for (let letra of primeiroNome) {
      let num = tabela[letra];
      if (num) contPN[num] = (contPN[num] || 0) + 1;
  }
  let talentoEsp = null, maxR = 0, segR = 0;
  for (let num in contPN) {
      if (contPN[num] > maxR) { segR = maxR; maxR = contPN[num]; talentoEsp = num; }
      else if (contPN[num] > segR) segR = contPN[num];
  }
  if (maxR < (segR * 2) || maxR === 0) talentoEsp = null;

  // 5. Períodos e Ciclos
  const ciclo1 = reduzir(mes), ciclo2 = reduzir(dia), ciclo3 = reduzir(ano);
  const md1 = reduzir(dia + mes), md2 = reduzir(dia + ano), md3 = reduzir(md1 + md2), md4 = reduzir(mes + ano);
  const fim1 = 37 - res.caminhoVida, fim2 = fim1 + 27;

  // 6. Montagem do Objeto Premium Final
// --- MONTAGEM DO PACOTE PREMIUM FINAL ---
  const dadosPremium = {
    nome: nomeInput,
    data: dataInput.split("-").reverse().join("/"),
    resultados: res,
    // Garanta que este bloco 'moderna' esteja aqui:
    moderna: {
        deficits: deficitsFinais,
        inclinacoes: inclinacoes,
        subconsciente: subconscienteNum,
        talentoEspecial: talentoEsp
    },
    periodos: { 
        ciclo1: `0-${fim1}`, ciclo2: `${fim1+1}-${fim2}`, ciclo3: `>${fim2}`, 
        md1: `0-${fim1}`, md2: `${fim1+1}-${fim1+9}`, md3: `${fim1+10}-${fim1+18}`, md4: `>${fim2}` 
    },
    textos: {
        dia: textos.dia[res.diaN],
        motivacao: textos.motivacao[res.motivacao],
        influencia: textos.influencia[res.influencia],
        expressao: textos.Personalidade[res.personalidade],
        comportamento: textos.comportamento[res.comportamento],
        destino: textos.CaminhodeVida[res.caminhoVida],
        missao: textos.Propósito[res.missao],
        ciclo1: (textos.ciclos) ? textos.ciclos[1][ciclo1] : "",
        ciclo2: (textos.ciclos) ? textos.ciclos[2][ciclo2] : "",
        ciclo3: (textos.ciclos) ? textos.ciclos[3][ciclo3] : "",
        md1: (textos.momentos) ? textos.momentos[1][md1] : "",
        md2: (textos.momentos) ? textos.momentos[2][md2] : "",
        md3: (textos.momentos) ? textos.momentos[3][md3] : "",
        md4: (textos.momentos) ? textos.momentos[4][md4] : "",
        d1: (textos.desafios) ? textos.desafios[1][d1] : "",
        d2: (textos.desafios) ? textos.desafios[2][d2] : "",
        d3: (textos.desafios) ? textos.desafios[3][d3] : "",
        anoPessoal: textos.anoPessoal[res.anoPessoal],
        deficiencias: faltantes.map(n => (textos.deficiencias ? textos.deficiencias[n] : "")).join(" ")
    }
  };

  // Salva no Navegador
  localStorage.setItem("dadosMapaPremium", JSON.stringify(dadosPremium));

// ============================================
  // 7. EXIBIÇÃO DE TODOS OS RESULTADOS (DESTRAVADO)
  // ============================================
  
  // Atalhos para facilitar a escrita (puxando do objeto que criamos acima)
  const t = dadosPremium.textos;
  const p = dadosPremium.periodos;

  const htmlGraficos = gerarGraficosIntensidade(res, faltantes, [d1, d2, d3], nomeInput);
  
  // Salva no Navegador para o Premium (PDF) conseguir ler depois
  localStorage.setItem("dadosMapaPremium", JSON.stringify(dadosPremium));
  localStorage.setItem("graficoParaOPremium", htmlGraficos);
  
  // Monta a exibição completa no HTML da página atual
  document.getElementById("resultado").innerHTML = `
    ${htmlGraficos}
    
    <div class="card" style="border-left: 8px solid #22c55e; background: #f0fdf4;">
        <h2 style="color:#166534; margin:0; border:none;">✨ ANÁLISE COMPLETA LIBERADA</h2>

    </div>

    ${card("Dia de Nascimento", "Talento Natural", res.diaN, t.dia)}
    ${card("Motivação", "Seu Íntimo", res.motivacao, t.motivacao)}
    ${card("Influência", "Sua Imagem", res.influencia, t.influencia)}
    ${card("Personalidade", "Sua Expressão", res.expressao || t.expressao, t.expressao)}
    ${card("Caminho de Vida", "Seu Destino", res.caminhoVida, t.destino)}
    ${card("Missão", "Propósito", res.missao, t.missao)}
