    top: -2px;
    left: 50%;

const particulas = [

];

function gerarPiramide(nome){

function detectarNegativas(linhas) {
    let detalhes = [];
    let pos = [];
    let numsSet = new Set();

    linhas.forEach((linha, i) => {
        let j = 0;
        while (j < linha.length) {
            let num = linha[j];
            let cont = 1;
            while (j + cont < linha.length && linha[j + cont] === num) { cont++; }

            if (cont >= 3) {
                numsSet.add(num);
                // Calcula o deslocamento (offset) para alinhar com as colunas do topo
                let offset = Math.floor(i / 2); 
                detalhes.push({
                    numero: num,
                    colunaInicio: j + offset,
                    repeticoes: cont,
                    linha: i
                });
                for (let k = j; k < j + cont; k++) pos.push({ l: i, c: k });
                j += cont;
            } else { j++; }
        }
    });
    return { pos, nums: [...numsSet], detalhes };
}

 // FunГ§ГЈo Universal de ReduГ§ГЈo NumerolГіgica
function calcularNumerologia(valor, aceitaMestre = true) {
    let num = parseInt(valor);
    
    // Se nГЈo for um nГәmero vГЎlido, retorna zero ou vazio
    if (isNaN(num)) return 0;

    while (num > 9) {
        // Se a regra permitir (aceitaMestre) e cair em 11, 22 ou 33, para aqui.
        if (aceitaMestre && (num === 11 || num === 22 || num === 33)) {
            break;
        }
        // Soma os dГӯgitos
        num = String(num).split('').reduce((acc, curr) => acc + parseInt(curr), 0);
    }
    return num;
}     
        
 // 1. FunГ§ГЈo que soma a data dГӯgito por dГӯgito (Linear)
function calcularCVLinear(dia, mes, ano) {

// 2. FunГ§ГЈo de reduГ§ГЈo que para no 11, 22 e 33
function reduzirRespeitandoMestres(num) {
    while (num > 9 && num !== 11 && num !== 22 && num !== 33) {

    }

}

        function calcularValorLetra(letra) {
            const base = letra.normalize("NFD")[0].toUpperCase();
            const valorBase = tabela[base] || 0;
            if (!valorBase) return 0;
            let soma = 0, mult = 1, norm = letra.normalize("NFD");
            for (let i = 1; i < norm.length; i++) {
                const c = norm[i];
                if (c === "\u0301") soma += 2;      // Agudo
                else if (c === "\u0302") soma += 7; // Circunflexo
                else if (c === "\u0303") soma += 3; // Til
                else if (c === "\u0327") soma += 6; // Cedilha
                else if (c === "\u0300" || c === "\u0308") mult *= 2; // Grave/Trema
            }
            return (valorBase + soma) * mult;
        }

// FunГ§ГЈo para calcular o Desejo Oculto usando a SUA 'tabela' CabalГӯstica
function calcularDesejoOculto(nome) {
    const contagem = {};
    // Limpa o nome e deixa em maiГәsculo para bater com a sua const tabela
    const nomeLimpo = nome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    
    for (let letra of nomeLimpo) {
        if (tabela[letra]) { // AQUI: Usando o nome exato da sua constante
            const num = tabela[letra];
            contagem[num] = (contagem[num] || 0) + 1;
        }
    }
    
    let maxRepeticoes = 0;
    let numeroDesejo = 0;
    for (const n in contagem) {
        if (contagem[n] > maxRepeticoes) {
            maxRepeticoes = contagem[n];
            numeroDesejo = n;
        }
    }
    return { numero: numeroDesejo, qtd: maxRepeticoes };
}

// FunГ§ГЈo para Talentos Especiais (Baseado apenas no PRIMEIRO NOME)
function calcularTalentoEspecial(primeiroNome) {
    const contagem = {};
    const nomeLimpo = primeiroNome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
    
    for (let letra of nomeLimpo) {
        if (tabela[letra]) { // AQUI: Usando o nome exato da sua constante
            const num = tabela[letra];
            contagem[num] = (contagem[num] || 0) + 1;
        }
    }
    
    const frequencias = Object.values(contagem).sort((a, b) => b - a);
    const maior = frequencias[0] || 0;
    const segundaMaior = frequencias[1] || 0;

    // CritГ©rio: aparece o dobro ou mais vezes que qualquer outro
    if (maior >= (segundaMaior * 2) && maior > 0) {
        return Object.keys(contagem).find(key => contagem[key] == maior);
    }
    return null;
}

    else if (statusPlano === "fraco") nota -= 2.13;

    // MODULAГҮГғO POR PERFIL
    const perfil = (dominantePerfil || "neutro").toLowerCase();
    if (perfil === "criativo") nota += 1.33;
    else if (perfil === "neutro") nota += 1.25;
    else if (perfil === "indeciso") nota -= 1.23;

    // DNA E SOMBRAS
    let dnaPositivo = [
        resultados.motivacao, resultados.Personalidade, resultados.influencia, 
        resultados.comportamento, resultados.CaminhodeVida, resultados.PropГіsito, 
        resultados.subconsciente, resultados.dia, resultados.equilibrio, 
        resultados.talento, resultados.essencia,resultados.talentosEspeciais, regenteMatriz];
    
    let sombras = [resultados.deficitRecorrente, d3].concat(resultados.deficitsOcultos || [], negativasMatriz);

    // TABELA DE PONTOS (Normalizada internamente para evitar o erro de leitura)
    const tabelaPontos = {
        "fisico": { "criativo": [5], "indeciso": [6], "neutro": [4] },
        "mental": { "criativo": [1], "indeciso": [1, 5, 8], "neutro": [3] },
        "emocional": { "criativo": [1, 7, 2], "indeciso": [2, 3, 4, 6] },
        "intuitivo": { "criativo": [2], "indeciso": [6, 8, 1], "neutro": [3, 6] }
    };

    // Normaliza o nome do plano para minГәsculo e sem acento para ler a tabela acima
    const planoBusca = planoAtual.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

    nums.forEach(n => {
        let pesoDNA = 0.8;
        
        // Verifica ressonГўncia no perfil (Usando a chave normalizada)
        if (tabelaPontos[planoBusca] && tabelaPontos[planoBusca][perfil] && tabelaPontos[planoBusca][perfil].includes(n)) {
            nota += 1.0;
        }

        if (n === vibPlano && statusPlano !== "fraco") nota += 1.0;

        nota += (dnaPositivo.filter(num => num === n).length * pesoDNA);
        nota -= (sombras.filter(num => num === n).length * 1.5);
        
        if (faltantes.includes(n.toString()) || faltantes.includes(Number(n))) {
            nota -= 1.2;
        }
    });

    return Math.min(Math.max(nota, 1.78), 9.87);
}

function calcularIntensidadeMomento(configAtributo, res, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz, vibPlano, statusPlano, dominantePerfil, planoAtual, idadeCronologica, fim1, fim2) {
    
    // 1. NOTA BASE (O que ele trouxe ao nascer)
    let nota = calcularIntensidadeAtributo(configAtributo.nums, res, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz, vibPlano, statusPlano, dominantePerfil, planoAtual);

    // 2. MODIFICADORES DE TEMPO (O "CLIMA" ATUAL)
    const anoP = res.anoPessoal;
    const desafioPrincipal = d3; // Aqui usamos o d3 que vem do parГўmetro (sem redeclarar)
    
    // --- LГ“GICA AUTOMГҒTICA DE CICLOS POR IDADE ---
    let cicloAtivo, momentoAtivo, desafioTemporarioAtivo;

    if (idadeCronologica <= fim1) {
        // Fase 1
        cicloAtivo = res.ciclos[1];
        momentoAtivo = res.momentos[1];
        desafioTemporarioAtivo = res.desafios[1];
    } else if (idadeCronologica <= fim2) {
        // Fase 2
        cicloAtivo = res.ciclos[2];
        momentoAtivo = res.momentos[2]; 
        desafioTemporarioAtivo = res.desafios[2];
    } else {
        // Fase 3 (Maturidade)
        cicloAtivo = res.ciclos[3];
        momentoAtivo = res.momentos[4]; 
        desafioTemporarioAtivo = 0; 
    }

    configAtributo.nums.forEach(n => {
        // BГ”NUS: AtivaГ§ГЈo pelo ANO PESSOAL
        if (n === anoP) nota += 0.35;

        // BГ”NUS: Ciclo e Momento que o cliente vive HOJE (AutomГЎtico)
        if (n === cicloAtivo) nota += 0.25;
        if (n === momentoAtivo) nota += 0.35;

        // Г”NUS: Desafio Principal (Aquele d3 que deu erro antes)
        if (n === desafioPrincipal) nota -= 0;

        // Г”NUS: Desafio TemporГЎrio da fase atual
        if (n === desafioTemporarioAtivo) nota -= 0.25;
    });

    // MantГ©m a nota entre 1.0 e 9.6 para o grГЎfico nГЈo quebrar
    return Math.min(Math.max(nota, 1.78), 9.87);
}

function calcularDadosPlanos(nome) {
    let soma = { fisico: 0, mental: 0, emocional: 0, intuitivo: 0 };
    let contPerfil = { criativo: 0, indeciso: 0, neutro: 0 };
    
    for(let l of nome.toUpperCase()) {
        let letraBase = l.normalize("NFD")[0];
        let valor = calcularValorLetra(l);
        for(let p in gruposPlanos) {
            if(gruposPlanos[p].includes(letraBase)) {
                soma[p] += valor;
                break;
            }
        }
        if (tabelaExpressao[letraBase]) contPerfil[tabelaExpressao[letraBase]]++;
    }
    
    // Cria o ranking de potГӘncias (do maior para o menor)
    const ranking = Object.entries(soma).sort((a, b) => b[1] - a[1]);
    
    return { 
        soma, 
        maior: ranking[0][1], 
        contPerfil, 
        dominantePerfil: Object.keys(contPerfil).reduce((a, b) => contPerfil[a] >= contPerfil[b] ? a : b),
        forcaPrincipal: ranking[0][0], // O plano com mais pontos
        desafioAtual: ranking[3][0]    // O plano com menos pontos
    };
}

function calcularAptidaoProfissional(res) {
    // 1. DefiniГ§ГЈo do nГәmero principal (usamos o Dia para o lado prГЎtico)
    const pilarPrincipal = reduzirPuro(res.dia);
    const pilares = [
        pilarPrincipal, 
        res.CaminhodeVida, 
        res.PropГіsito, 
        res.Personalidade
    ];
    
    let contagem = {};

    // 2. Mapeia a frequГӘncia de cada ГЎrea (LГіgica das ГҒreas de AtuaГ§ГЈo)
    pilares.forEach(num => {
        const areas = bancoAreasAtuacao[num] || [];
        areas.forEach(area => {
            contagem[area] = (contagem[area] || 0) + 1;
        });
    });

    let areasOrdenadas = Object.keys(contagem).map(area => {
        return { nome: area, pontos: contagem[area] };
    });

    // OrdenaГ§ГЈo Decrescente
    areasOrdenadas.sort((a, b) => b.pontos - a.pontos);

    // 3. CRIAГҮГғO DAS VARIГҒVEIS (O que estava faltando)
    let vocacaoMaster = areasOrdenadas.slice(0, 18).map(item => item.nome);
    let afinidade = areasOrdenadas.slice(18, 48).map(item => item.nome);

    // Busca ocupaГ§Гөes CLT (PrГЎticas)
    let caminhosPraticos = bancoOcupacoesPraticas[pilarPrincipal] || [];
    let listaCLT = caminhosPraticos.slice(0, 20).join(" вҖў ");

    // Busca Estudos (Faculdade e TГ©cnico)
    const estudos = bancoEstudos[pilarPrincipal] || { faculdades: [], cursosTecnicos: [] };
    const listaFaculdades = estudos.faculdades.join(" вҖў ");
    const listaTecnicos = estudos.cursosTecnicos.join(" вҖў ");

    // 4. MONTAGEM DO HTML (Com todos os quadros)
    return `
         <div class="evitar-corte" style="margin-top: 10px; padding: 20px; background: #fffcf0; border: 1px solid #d97a1e; border-left: 8px solid #d97a1e; border-radius: 8px;">

            <p style="font-size: 1.1rem; font-weight: bold; color: #1a1a1a; line-height: 1.5; text-align: justify;">
                ${vocacaoMaster.length > 0 ? vocacaoMaster.join(" вҖў ") : "LideranГ§a EstratГ©gica вҖў GestГЈo de NegГіcios"}
            </p>
        </div>

         <div class="evitar-corte" style="margin-top: 60px; padding: 40px; background: #fdf2f8; border: 1px solid #be185d; border-left: 8px solid #be185d; border-radius: 8px;">
            <h4 style="color: #be185d; margin-bottom: 10px; text-transform: uppercase; font-size: 1rem; letter-spacing: 1px;">рҹҺ“ Guia de FormaГ§ГЈo Recomendada</h4>
            <p style="margin-bottom: 30px; font-size: 0.95rem; color: #1a1a1a;">
                <strong>Ensino Superior (GraduaГ§Гөes):</strong><br>
                <span style="color: #444;">${listaFaculdades}</span>
            </p>
            <p style="font-size: 0.95rem; color: #1a1a1a;">
                <strong>Cursos Profissionalizantes e TГ©cnicos:</strong><br>
                <span style="color: #444;">${listaTecnicos}</span>
            </p>
        </div>

         <div class="evitar-corte" style="margin-top: 80px; padding: 20px; background: #f0fdf4; border: 1px solid #16a34a; border-left: 8px solid #16a34a; border-radius: 8px;">
            <h4 style="color: #16a34a; margin-bottom: 10px; text-transform: uppercase; font-size: 1rem; letter-spacing: 1px;">рҹҡҖ Entrada Imediata (Mercado CLT)</h4>
            <p style="font-size: 1rem; font-weight: 600; color: #1a1a1a; line-height: 1.6;">

            </p>
        </div>
    `;
}

function analisarAptidaoPremium(res) {
    const pilares = [
        reduzirPuro(res.dia), 
        res.CaminhodeVida, 
        res.PropГіsito, 
        res.Personalidade
    ];

    let contagemAreas = {};

    pilares.forEach(num => {
        const areas = bancoAreasAtuacao[num] || [];
        areas.forEach(area => {
            contagemAreas[area] = (contagemAreas[area] || 0) + 1;
        });
    });

    // Filtramos ГЎreas com 3+ (VocaГ§ГЈo Master) e 2 (Afinidade)
    let vocacaoMaster = Object.keys(contagemAreas).filter(a => contagemAreas[a] >= 3);
    let afinidade = Object.keys(contagemAreas).filter(a => contagemAreas[a] === 2);

    return { vocacaoMaster, afinidade };
}


function formatarProfissoesSimples(res) {
    // Chamamos a anГЎlise que vocГӘ jГЎ tem
    const dados = analisarAptidaoPremium(res);
    
    // Tentamos pegar a VocaГ§ГЈo Master (3+ pontos), 
    // se estiver vazia, pegamos a Afinidade (2 pontos)
    let listaParaExibir = dados.vocacaoMaster.length > 0 
        ? dados.vocacaoMaster 
        : dados.afinidade;

    // Se ainda assim nГЈo tiver nada, pegamos as primeiras ГЎreas do banco
    if (listaParaExibir.length === 0) {
        listaParaExibir = ["Consultoria", "GestГЈo"]; 
    }

    // Pegamos apenas as 2 primeiras para nГЈo espremer o layout
    const textoFinal = listaParaExibir.slice(0, 2).join(" вҖў ");

    // Retornamos com um span para diminuir o tamanho da letra
    return `<span style="font-size: 0.75rem; line-height: 1.1; display: block;">${textoFinal}</span>`;
}

function formatarNomeExibicao(nomeDigitado) {
    // Esta funГ§ГЈo coloca um espaГ§o antes de qualquer letra maiГәscula 
    // que esteja "grudada" em outra, exceto no inГӯcio.
    // Ex: "DeSouza" -> "De Souza" | "Vanderlei" -> "Vanderlei" (permanece igual)
    
    return nomeDigitado.replace(/([a-z])([A-Z])/g, '$1 $2');
}

function calcularNumerosSocial(nome) {
    const tabelaBase = {
        'A': 1, 'B': 2, 'C': 3, 'D': 4, 'E': 5, 'F': 8, 'G': 3, 'H': 5,
        'I': 1, 'J': 1, 'K': 2, 'L': 3, 'M': 4, 'N': 5, 'O': 7, 'P': 8,
        'Q': 1, 'R': 2, 'S': 3, 'T': 4, 'U': 6, 'V': 6, 'W': 6, 'X': 6,
        'Y': 1, 'Z': 7
    };

    let totalMotivacao = 0; // Vogais
    let totalInfluencia = 0; // Consoantes
    
    const vogais = "AEIOUYГҒГүГҚГ“ГҡГӮГҠГҺГ”ГӣГғГ•ГҖГҲГҢГ’ГҷГ„ГӢГҸГ–Гң";
    const nomeLimpo = nome.trim().toUpperCase();

    // Divide o nome em palavras para tratar cada letra e seus acentos
    for (let char of nomeLimpo) {
        if (char === " ") continue;

        let valorLetra = 0;
        let base = char.normalize("NFD")[0]; // Pega a letra sem acento
        
        if (tabelaBase[base]) {
            valorLetra = tabelaBase[base];

            // --- LГ“GICA DE MODIFICADORES CABALГҚSTICOS ---
            if (/[ГҒГүГҚГ“Гҡ]/.test(char)) valorLetra += 2;
            if (/[ГғГ•]/.test(char)) valorLetra += 3;
            if (/[ГӮГҠГҺГ”Гӣ]/.test(char)) valorLetra += 7;
            if (char === "ГҮ") valorLetra += 6;
            if (/[ГҖГҲГҢГ’ГҷГ„ГӢГҸГ–Гң]/.test(char)) valorLetra *= 2; // Multiplicador (dobra)

            // SeparaГ§ГЈo para MotivaГ§ГЈo e InfluГӘncia
            if (vogais.includes(char)) {
                totalMotivacao += valorLetra;
            } else {
                totalInfluencia += valorLetra;
            }
        }
    }

    // FunГ§ГЈo interna para reduГ§ГЈo cabalГӯstica (mantГ©m 11 e 22 se vocГӘ usar, ou reduz tudo)
    const reduzir = (num) => {
        while (num > 9 && num !== 11 && num !== 22) {
            num = String(num).split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
        }
        return num;
    };

    const mot = reduzir(totalMotivacao);
    const inf = reduzir(totalInfluencia);
    const pers = reduzir(mot + inf);

    return {
        personalidade: pers,
        motivacao: mot,
        influencia: inf
    };
}
