function valorLetraMatriz(l){
    let n = l.normalize("NFD");
    let v = mapaMatriz[n[0].toUpperCase()] ?? 0;
    let s = 0;
    if(n.includes("\u0301")) s=2; else if(n.includes("\u0302")) s=7; else if(n.includes("\u0303")) s=3; else if(n.includes("\u0327")) s=6;
    return (v + s) * (n.includes("\u0300") || n.includes("\u0308") ? 2 : 1);
}

function gerarPiramide(nome){
    let base = [];
    for(let l of nome.toUpperCase()){ if(l !== " "){ let v = valorLetraMatriz(l); if(v) base.push(v); } }
    let linhas = [base];
    while(base.length > 1){
        let nova = [];
        for(let i=0; i<base.length-1; i++){
            let soma = base[i] + base[i+1];
            while(soma > 9) soma = soma.toString().split('').reduce((a,b)=>+a + +b, 0);
            nova.push(soma);
        }
        linhas.push(nova);
        base = nova;
    }
    return linhas;
}

// Adicione esta função para o código saber agrupar os números de 2 em 2
function topo(base) {
    let arcanos = [];
    for (let i = 0; i < base.length - 1; i++) {
        arcanos.push(parseInt("" + base[i] + base[i + 1]));
    }
    return arcanos;
}        

function detectarNegativas(linhas){
    let pos = []; let nums = [];
    linhas.forEach((linha, i) => {
        let cont = 1;
        for(let j=1; j<linha.length; j++){
            if(linha[j] === linha[j-1]) cont++;
            else {
                if(cont >= 3){ 
                    nums.push(linha[j-1]);
                    for(let k=j-cont; k<j; k++) pos.push({l:i, c:k});
                }
                cont = 1;
            }
        }
        if(cont >= 3){ 
            nums.push(linha[linha.length-1]);
            for(let k=linha.length-cont; k<linha.length; k++) pos.push({l:i, c:linha.length-1-k});
        }
    });
    return { pos, nums: [...new Set(nums)] };
}

        function reduzir(n) { if (n === 0) return 0; let r = Math.abs(n) % 9; return r === 0 ? 9 : r; }

        function calcularValorLetra(letra) {
            const base = letra.normalize("NFD")[0].toUpperCase();
            const valorBase = tabela[base] || 0;
            if (!valorBase) return 0;
            let soma = 0, mult = 1, norm = letra.normalize("NFD");
            for (let i = 1; i < norm.length; i++) {
                const c = norm[i];
                if (c === "\u0301") soma += 2;      // Agudo
                else if (c === "\u0302") soma += 7; // Circunflexo
                else if (c === "\u0303") soma += 3; // Til
                else if (c === "\u0327") soma += 6; // Cedilha
                else if (c === "\u0300" || c === "\u0308") mult *= 2; // Grave/Trema
            }
            return (valorBase + soma) * mult;
        }

function aplicarFiltroTexto(texto) {
    // Se o texto não existir, for nulo ou não for uma string, retorna vazio ou um aviso
    if (!texto || typeof texto !== 'string') {
        return ""; 
    }
    let pNome = document.getElementById("nome").value.trim().split(' ')[0] || "você";
    return texto.replace(/você/gi, `<strong>${pNome}</strong>`).replace(/voce/gi, `<strong>${pNome}</strong>`);
}
function calcularIntensidadeAtributo(nums, resultados, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz) {
    let nota = 4.5 + (nomeRaw.length % 3) * 0.17; 
    
    // PILARES DE LUZ (Incluindo Regente da Matriz)
    const dnaPositivo = [
        resultados.motivacao, resultados.Personalidade, resultados.influencia, 
        resultados.comportamento, resultados.CaminhodeVida, resultados.Propósito, 
        resultados.subconsciente, resultados.dia, resultados.equilibrio, 
        resultados.talento, resultados.essencia, regenteMatriz // <-- Adicionado aqui
    ];

    // PILARES DE SOMBRA (Incluindo Sequências Negativas)
    const sombras = [resultados.deficitRecorrente, d3].concat(resultados.deficitsOcultos || [], negativasMatriz); // <-- Adicionado aqui

    nums.forEach(n => {
        nota += (dnaPositivo.filter(num => num === n).length * 2.55); 
        nota -= (sombras.filter(num => num === n).length * 1.31); 
        if (faltantes.includes(n.toString()) || faltantes.includes(Number(n))) nota -= 1.47;
    });

    return Math.min(Math.max(nota, 1.2), 9.8);
}

function gerarTodosOsGraficos(res, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz) {
    let rankingGeral = [];

    // Calcula a nota para cada atributo no banco de dados
    for (let nomeAtributo in megaBancoAtributos) {
        let dados = megaBancoAtributos[nomeAtributo];
        let nota = calcularIntensidadeAtributo(dados.nums, res, faltantes, nomeRaw, d3, regenteMatriz, negativasMatriz);
        rankingGeral.push({
            nome: nomeAtributo,
            nota: nota,
            plano: dados.plano,
            percentual: (nota * 10).toFixed(1)
        });
    }

    const planos = ["Físico", "Mental", "Emocional", "Intuitivo"];
    let htmlFinal = `<h2 style="color:#827108; text-align:center; margin-top:40px; text-transform:uppercase; letter-spacing:2px;">Análise por Planos de Expressão</h2>`;

    planos.forEach(p => {
        const itensPlano = rankingGeral.filter(i => i.plano === p).sort((a,b) => b.nota - a.nota);
        
        // Cria um bloco para cada Plano (Físico, Mental, etc.)
        htmlFinal += `
            <div class="secao-plano" style="margin-bottom: 30px; background:#fff; padding:20px; border-radius:8px; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.03);">
                <h3 style="color:#827108; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; text-transform: uppercase; font-size: 18px;">
                    Plano ${p}
                </h3>
                <div style="margin-top: 15px;">
        `;

        itensPlano.forEach(item => {
            let corBarra = "#2e7d32"; // Verde (Luz)
            if (item.nota < 5.2) corBarra = "#cc0000"; // Vermelho (Sombra)
            else if (item.nota < 7) corBarra = "#827108"; // Dourado (Neutro)

            htmlFinal += montarBarraGrafico(item, corBarra);
        });

        htmlFinal += `</div></div>`;
    });

    return htmlFinal;
}

function calcularDadosPlanos(nome) {
    let soma = { fisico: 0, mental: 0, emocional: 0, intuitivo: 0 };
    let contPerfil = { criativo: 0, indeciso: 0, neutro: 0 };
    
    for(let l of nome.toUpperCase()) {
        let letraBase = l.normalize("NFD")[0];
        let valor = calcularValorLetra(l);
        for(let p in gruposPlanos) {
            if(gruposPlanos[p].includes(letraBase)) {
                soma[p] += valor;
                break;
            }
        }
        if (tabelaExpressao[letraBase]) contPerfil[tabelaExpressao[letraBase]]++;
    }
    
    // Cria o ranking de potências (do maior para o menor)
    const ranking = Object.entries(soma).sort((a, b) => b[1] - a[1]);
    
    return { 
        soma, 
        maior: ranking[0][1], 
        contPerfil, 
        dominantePerfil: Object.keys(contPerfil).reduce((a, b) => contPerfil[a] >= contPerfil[b] ? a : b),
        forcaPrincipal: ranking[0][0], // O plano com mais pontos
        desafioAtual: ranking[3][0]    // O plano com menos pontos
    };
}

function montarHtmlPlanosNatural(nome) {

    const nomesAmigaveis = { fisico: "Físico", mental: "Mental", emocional: "Emocional", intuitivo: "Intuitivo" };
    
    // 1. Prepara o ranking para a Síntese (P1 e P4)
    const planosOrdenados = Object.entries(dados.soma)
        .map(([chave, valor]) => {
            let vib = reduzir(valor);
            let nv = "medio";
            if (vib <= 3) nv = "fraco";
            else if (vib >= 7) nv = "forte";
            return { chave, valor, nivel: nv, vib };
        })
        .sort((a, b) => b.valor - a.valor);

    const p1 = planosOrdenados[0];
    const p4 = planosOrdenados[3];

    // --- INÍCIO DO HTML ---
    let html = `
        <div class="secao-card quebra-pagina">
            <h2 class="titulo-topico">Plano de Expressão Natural</h2>
            <div class="intro-texto">${aplicarFiltroTexto(introducoes.natural)}</div>
            <div style="margin-top:20px;">
    `;

    // 2. RENDERIZAÇÃO DAS BARRAS + TEXTOS INDIVIDUAIS (Físico, Mental, etc.)
    for(let p in dados.soma) {
        let numRed = reduzir(dados.soma[p]);
        let porcentagem = (dados.soma[p] / dados.maior) * 100;
        
        // BUSCA O TEXTO NO textosPlanos (Ex: textosPlanos.fisico.forte[9])
        const textoPlanoIndiv = textosPlanos[p]?.forte[numRed] || "";

        html += `
            <div style="margin-bottom: 30px; border-left: 4px solid ${coresPlanos[p]}; padding-left: 15px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;">
                    <span style="font-weight:bold; font-size:16px; color:var(--dark); text-transform:uppercase;">${nomesAmigaveis[p]}</span>
                    <span style="background:var(--gold); color:white; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:bold;">Vibração ${numRed}</span>
                </div>
                <div style="height:8px; background:#eee; border-radius:4px; overflow:hidden; margin-bottom:12px;">
                    <div style="width:${porcentagem}%; height:100%; background:${coresPlanos[p]};"></div>
                </div>
                <div class="texto-res" style="font-size:15px; color:#333;">${aplicarFiltroTexto(textoPlanoIndiv)}</div>
            </div>
        `;
    }

    // 3. PERFIL DE COMPORTAMENTO (Criativo, Neutro, Indeciso)
    // BUSCA NO textosExpressao[dados.dominantePerfil]
    const textoPerfilComp = textosExpressao[dados.dominantePerfil] || "";
    
    html += `
            <div style="margin-top:40px; padding:25px; border:1px solid var(--gold); background:rgba(212, 175, 55, 0.05); border-radius:8px; position:relative;">
                <div style="position:absolute; top:-12px; left:20px; background:var(--gold); color:white; padding:2px 15px; font-size:11px; font-weight:bold; border-radius:20px;">PERFIL DE COMPORTAMENTO</div>
                <h3 style="color:var(--dark); margin-bottom:10px; text-transform:uppercase;">${dados.dominantePerfil}</h3>
                <div class="texto-res" style="font-style: italic;">${aplicarFiltroTexto(textoPerfilComp)}</div>
            </div>
    `;

    // 4. SÍNTESE DO PERFIL (Utilizando o seu baseTextos da foto)
    const txtForca = baseTextos[p1.chave][p1.nivel];
    const txtDesafio = baseTextos[p4.chave][p4.nivel];
    let conclusaoDinamica = p1.nivel === "forte" && p4.nivel === "fraco" 
        ? `Você opera em Alta Polaridade. Sua força no ${nomesAmigaveis[p1.chave]} impulsiona sua jornada.`
        : `Seu perfil mostra uma dinâmica de equilíbrio entre ${nomesAmigaveis[p1.chave]} e ${nomesAmigaveis[p4.chave]}.`;

    html += `
            <div style="margin-top:50px; border-top:2px solid var(--gold); padding-top:25px; background:#f9f9f9; padding:20px; border-radius:12px;">
                <h3 style="text-align:center; color:var(--dark); margin-bottom:20px; text-transform:uppercase; letter-spacing:2px;">Síntese da Matriz</h3>
                
                <p><strong>Força Principal (${nomesAmigaveis[p1.chave]}):</strong><br>
                <span class="texto-res">${aplicarFiltroTexto(txtForca)}</span></p>
                
                <p><strong>Desafio Atual (${nomesAmigaveis[p4.chave]}):</strong><br>
                <span class="texto-res">${aplicarFiltroTexto(txtDesafio)}</span></p>
                
                <div style="margin-top:20px; padding:15px; background:var(--dark); color:var(--gold); border-radius:8px; text-align:center;">
                    <strong>CONEXÃO FINAL:</strong><br>
                    <span>${aplicarFiltroTexto(conclusaoDinamica)}</span>
                </div>
            </div>
        </div>
    `;

    return html;
}
