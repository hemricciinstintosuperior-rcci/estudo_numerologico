<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instinto Superior - Numerologia Cabalística</title>
  <style>
    html, body { width:100%; overflow-x:hidden; }
    *{ box-sizing:border-box; }
    body{ font-family: Arial, sans-serif; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; background: #f9fafb; }
    h1{ text-align:center; margin-bottom:30px; color: #111827; }
    .container{ width:100%; max-width:500px; display:flex; flex-direction:column; gap:20px; }
    .campo{ display:flex; flex-direction:column; font-size:14px; font-weight:bold; color:#333; }
    .campo input{ margin-top:8px; padding:14px; font-size:16px; border-radius:8px; border:1px solid #ccc; background:#e5e7eb; width:100%; }
    .botoes-topo{ display:flex; gap:15px; margin-top:30px; width:100%; }
    .btn-gerar, .btn-premium{ flex:1; padding:16px; font-size:16px; border-radius:10px; font-weight:bold; text-align:center; cursor: pointer; border: none; }
    .btn-gerar{ background:#22c55e; color:white; }
    .btn-premium{ background:linear-gradient(45deg,#6a11cb,#2575fc); color:white; text-decoration:none; display: block; }
    .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 600px; }
    .card h3 { color: #1f2937; margin-top: 0; border-bottom: 2px solid #f3f4f6; padding-bottom: 10px; }
    .texto { white-space: pre-line; color: #4b5563; line-height: 1.6; font-size: 16px; margin-top: 15px; }
    @media (max-width:600px){ .botoes-topo{ flex-direction:column; } }
  </style>
</head>
<body>

<h1>Estudo Numerológico Cabalístico</h1>
<div class="container">
  <div class="campo"> Nome completo (igual certidão) <input id="nome" type="text" placeholder="Ex: João Silva"> </div>
  <div class="campo"> Data de nascimento <input id="data" type="date"> </div>
  <div class="botoes-topo">
    <button class="btn-gerar" onclick="gerarMapa()">Gerar Mapa Gratuito</button>
    <a id="btnPremium" onclick="validarPremium()" class="btn-premium">🔓 Relatório Premium</a>
  </div>
</div>

<div id="resultado" style="margin-top: 40px; width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

<script src="textos.js"></script>

<script>
// --- TABELA BASE ---
const tabela = { A:1, J:1, I:1, Q:1, Y:1, B:2, K:2, R:2, C:3, G:3, L:3, S:3, D:4, M:4, T:4, E:5, H:5, N:5, U:6, V:6, W:6, X:6, Ç:6, O:7, Z:7, F:8, P:8 };
const vogais = ["A","E","I","O","U"];

// --- BANCO DO GRÁFICO (NUNCA ESQUECER) ---
const bancoLegendasCompleto = {
    "Liderança": { nums: [1], cat: "Realização" }, "Visão Empreendedora": { nums: [1, 8], cat: "Realização" }, "Autoridade": { nums: [8], cat: "Realização" },
    "Gestão Financeira": { nums: [8, 4], cat: "Realização" }, "Poder de Execução": { nums: [4, 8], cat: "Realização" }, "Ambição": { nums: [8, 1], cat: "Realização" },
    "Independência": { nums: [1, 5], cat: "Realização" }, "Proatividade": { nums: [1], cat: "Realização" }, "Domínio": { nums: [1, 8], cat: "Realização" },
    "Competitividade": { nums: [1, 8, 5], cat: "Realização" }, "Senso de Oportunidade": { nums: [5, 8], cat: "Realização" }, "Realização Material": { nums: [8, 4], cat: "Realização" },
    "Análise": { nums: [7], cat: "Mentalidade" }, "Estratégia": { nums: [4, 7, 8], cat: "Mentalidade" }, "Perfeccionismo": { nums: [4], cat: "Mentalidade" },
    "Discernimento": { nums: [7, 9], cat: "Mentalidade" }, "Organização": { nums: [4], cat: "Mentalidade" }, "Inovação": { nums: [1, 5], cat: "Mentalidade" },
    "Disciplina": { nums: [4, 1], cat: "Mentalidade" }, "Praticidade": { nums: [4, 8], cat: "Mentalidade" }, "Concentração": { nums: [7, 4], cat: "Mentalidade" },
    "Visão Sistêmica": { nums: [9, 7, 8], cat: "Mentalidade" }, "Racionalidade": { nums: [4, 7], cat: "Mentalidade" }, "Método": { nums: [4], cat: "Mentalidade" },
    "Magnetismo": { nums: [3, 5], cat: "Social" }, "Diplomacia": { nums: [2], cat: "Social" }, "Persuasão": { nums: [3, 8], cat: "Social" },
    "Carisma": { nums: [3], cat: "Social" }, "Mediação": { nums: [2, 6], cat: "Social" }, "Eloquência": { nums: [3, 5], cat: "Social" },
    "Influência": { nums: [8, 3, 9], cat: "Social" }, "Extroversão": { nums: [3, 5], cat: "Social" }, "Expressividade": { nums: [3], cat: "Social" },
    "Networking": { nums: [5, 3, 2], cat: "Social" }, "Poder de Convencimento": { nums: [3, 1, 8], cat: "Social" }, "Popularidade": { nums: [3, 6], cat: "Social" },
    "Empatia": { nums: [2, 9], cat: "Essência" }, "Acolhimento": { nums: [6], cat: "Essência" }, "Intuição": { nums: [7, 9], cat: "Essência" },
    "Altruísmo": { nums: [9], cat: "Essência" }, "Equilíbrio": { nums: [6, 2], cat: "Essência" }, "Sensibilidade": { nums: [2, 7], cat: "Essência" },
    "Idealismo": { nums: [9, 6], cat: "Essência" }, "Harmonia": { nums: [6], cat: "Essência" }, "Generosidade": { nums: [9, 6], cat: "Essência" },
    "Espiritualidade": { nums: [7, 9], cat: "Essência" }, "Zelo": { nums: [6, 4], cat: "Essência" }, "Paternidade/Maternidade": { nums: [6, 2], cat: "Essência" },
    "Versatilidade": { nums: [5], cat: "Evolução" }, "Adaptação": { nums: [5, 2], cat: "Evolução" }, "Dinamismo": { nums: [5, 1], cat: "Evolução" },
    "Resiliência": { nums: [9, 4], cat: "Evolução" }, "Ousadia": { nums: [1, 5], cat: "Evolução" }, "Flexibilidade": { nums: [5, 3], cat: "Evolução" },
    "Desapego": { nums: [9, 5], cat: "Evolução" }, "Curiosidade": { nums: [5, 7], cat: "Evolução" }, "Transformação": { nums: [9, 5, 1], cat: "Evolução" },
    "Agilidade": { nums: [5, 1], cat: "Evolução" }, "Liberdade": { nums: [5], cat: "Evolução" }, "Aventura": { nums: [5], cat: "Evolução" }
};

// --- FUNÇÕES DE CÁLCULO ---
function reduzir(n) { if (n === 0) return 0; n = Math.abs(n); let r = n % 9; return r === 0 ? 9 : r; }
function reduzirDesafio(n) { return Math.abs(n); } // Desafios podem ser 0

function calcularValorComAcentos(letra) {
  const base = letra.normalize("NFD")[0];
  const valorBase = tabela[base];
  if (!valorBase) return 0;
  let soma = 0, mult = 1;
  const normalizada = letra.normalize("NFD");
  for (let i = 1; i < normalizada.length; i++) {
    const c = normalizada[i];
    if (c === "\u0301") soma += 2; else if (c === "\u0302") soma += 7;
    else if (c === "\u0303") soma += 3; else if (c === "\u0327") soma += 6;
    else if (c === "\u0300" || c === "\u0308") mult *= 2;
  }
  return (valorBase + soma) * mult;
}

function gerarMapa() {
  const nomeInput = document.getElementById("nome").value.trim();
  const dataInput = document.getElementById("data").value;
  if(nomeInput.length < 5 || !dataInput) { alert("Preencha nome e data."); return; }

  const [ano, mes, dia] = dataInput.split("-").map(Number);
  const nomeUp = nomeInput.toUpperCase();

  // 1. Cálculos da Triade e Essenciais
  let somaV = 0, somaC = 0, usados = new Set();
  for (let l of nomeUp) {
    const v = calcularValorComAcentos(l);
    if (!v) continue;
    const b = l.normalize("NFD")[0];
    if(tabela[b]) usados.add(tabela[b]);
    vogais.includes(b) ? somaV += v : somaC += v;
  }

  const res = {
    dia: reduzir(dia),
    motivação: reduzir(somaV),
    influência: reduzir(somaC),
    Personalidade: reduzir(somaV + somaC),
    "Caminho de Vida": reduzir(dia + mes + ano),
    "Propósito": reduzir(reduzir(dia + mes + ano) + reduzir(somaV + somaC)),
    Maturidade: reduzir(reduzir(dia + mes + ano) + reduzir(somaV + somaC)),
    Relacionamento: reduzir(somaV), // Base cabalística padrão
    anoPessoal: reduzir(dia + mes + new Date().getFullYear()),
    essência: reduzir(somaV), // Calculado pelas vogais
    equilíbrio: (function(){
        let somaIni = 0; 
        nomeInput.split(/\s+/).forEach(p => { if(p.length > 0) somaIni += tabela[p[0].toUpperCase().normalize("NFD")[0]] || 0; });
        return reduzir(somaIni);
    })(),
    talento: reduzir(reduzir(somaV) + reduzir(somaV + somaC))
  };

  // 2. Ciclos, Momentos e Desafios
  const c = [reduzir(mes), reduzir(dia), reduzir(ano)];
  const m = [reduzir(dia + mes), reduzir(dia + ano), reduzir(reduzir(dia+mes) + reduzir(dia+ano)), reduzir(mes + ano)];
  const d = [reduzirDesafio(dia - mes), reduzirDesafio(dia - reduzir(ano)), reduzirDesafio(reduzirDesafio(dia - mes) - reduzirDesafio(dia - reduzir(ano)))];

  // 3. Mentalidade e Comportamento
  let faltantes = []; for (let i=1; i<=9; i++) if(!usados.has(i)) faltantes.push(i);
  const subconscienteNum = 9 - faltantes.length;

  // 4. Exibição com as Chaves Exatas do textos.js
  let html = `
    <div class="card" style="background: #0a0e1a; color: #fff; border-left: 10px solid #d4af37;">
        <h3 style="color:#d4af37; border:none;">🛡️ SEGREDOS DA ALMA</h3>
        <p><strong>essência:</strong> ${res.essência}<br><small style="color:#aaa;">${textos.essência[res.essência]}</small></p>
        <p><strong>talento:</strong> ${res.talento}<br><small style="color:#aaa;">${textos.talento[res.talento]}</small></p>
        <p><strong>equilíbrio:</strong> ${res.equilíbrio}<br><small style="color:#aaa;">${textos.equilíbrio[res.equilíbrio]}</small></p>
    </div>

    <div class="card" style="background: #fafafa; border-top: 4px solid #3b82f6;">
        <h3 style="border:none;">🧠 MENTALIDADE E COMPORTAMENTO</h3>
        <p><strong>deficientes:</strong><br><small>${faltantes.map(n => textos.deficientes[n]).join(" | ")}</small></p>
        <p><strong>déficit:</strong><br><small>${faltantes.map(n => textos.déficit[n]).join("<br>")}</small></p>
        <p><strong>inclinações:</strong><br><small>${textos.inclinações[res.motivação]}</small></p>
        <p><strong>subconsciente:</strong><br><small>${textos.subconsciente[subconscienteNum]}</small></p>
    </div>

    ${card("motivação", "Íntimo", res.motivação, textos.motivação[res.motivação])}
    ${card("influência", "Imagem", res.influência, textos.influência[res.influência])}
    ${card("Personalidade", "Expressão", res.Personalidade, textos.Personalidade[res.Personalidade])}
    ${card("Caminho de Vida", "Destino", res["Caminho de Vida"], textos["Caminho de Vida"][res["Caminho de Vida"]])}
    ${card("Propósito", "Missão", res.Propósito, textos.Propósito[res.Propósito])}
    ${card("Maturidade", "Realização", res.Maturidade, textos.Maturidade[res.Maturidade])}
    ${card("Relacionamento", "Afetivo", res.Relacionamento, textos.Relacionamento[res.Relacionamento])}

    <div class="card">
        <h3>⏳ CICLOS</h3>
        <p><strong>ciclos 1:</strong> ${textos.ciclos[1][c[0]]}</p>
        <p><strong>ciclos 2:</strong> ${textos.ciclos[2][c[1]]}</p>
        <p><strong>ciclos 3:</strong> ${textos.ciclos[3][c[2]]}</p>
    </div>

    <div class="card">
        <h3>🏆 MOMENTOS</h3>
        <p><strong>momento 1:</strong> ${textos.momentos[1][m[0]]}</p>
        <p><strong>momento 2:</strong> ${textos.momentos[2][m[1]]}</p>
        <p><strong>momento 3:</strong> ${textos.momentos[3][m[2]]}</p>
        <p><strong>momento 4:</strong> ${textos.momentos[4][m[3]]}</p>
    </div>

    <div class="card" style="background: #fff5f5;">
        <h3 style="color:#c53030;">⚠️ DESAFIOS</h3>
        <p><strong>desafio 1:</strong> ${textos.desafios[1][d[0]]}</p>
        <p><strong>desafio 2:</strong> ${textos.desafios[2][d[1]]}</p>
        <p><strong>desafio principal:</strong> ${textos.desafios[3][d[2]]}</p>
    </div>

    <div class="card" style="background: #0a0e1a; color: #fff; text-align:center;">
        <h3 style="color: #d4af37;">ano Pessoal: ${res.anoPessoal}</h3>
        <p>${textos.anoPessoal[res.anoPessoal]}</p>
    </div>
  `;

  document.getElementById("resultado").innerHTML = html;
  mapaGerado = true;
}

function card(titulo, subtitulo, numero, textoRaw) {
  return `<div class="card"><h3>${titulo}</h3><p><strong>${subtitulo}</strong> | Número: ${numero}</p><div class="texto">${textoRaw}</div></div>`;
}

function validarPremium() { if(!mapaGerado){ alert("Gere o mapa."); return; } window.open("https://hemricciinstintosuperior-rcci.github.io/estudo_numerologico/premiummapa.html","_blank"); }
</script>
</body>
</html>
