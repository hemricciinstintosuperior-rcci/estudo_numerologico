<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instinto Superior - Numerologia Cabalística</title>
  <style>
    html, body { width:100%; overflow-x:hidden; }
    *{ box-sizing:border-box; }
    body{ font-family: Arial, sans-serif; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; background: #f9fafb; }
    h1{ text-align:center; margin-bottom:30px; color: #111827; }
    .container{ width:100%; max-width:500px; display:flex; flex-direction:column; gap:20px; }
    .campo{ display:flex; flex-direction:column; font-size:14px; font-weight:bold; color:#333; }
    .campo input{ margin-top:8px; padding:14px; font-size:16px; border-radius:8px; border:1px solid #ccc; background:#e5e7eb; width:100%; }
    .botoes-topo{ display:flex; gap:15px; margin-top:30px; width:100%; }
    .btn-gerar, .btn-premium{ flex:1; padding:16px; font-size:16px; border-radius:10px; font-weight:bold; text-align:center; cursor: pointer; border: none; }
    .btn-gerar{ background:#22c55e; color:white; }
    .btn-premium{ background:linear-gradient(45deg,#6a11cb,#2575fc); color:white; text-decoration:none; display: block; }
    .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 600px; }
    .card h3 { color: #1f2937; margin-top: 0; border-bottom: 2px solid #f3f4f6; padding-bottom: 10px; }
    .texto { white-space: pre-line; color: #4b5563; line-height: 1.6; font-size: 16px; margin-top: 15px; }
    @media (max-width:600px){ .botoes-topo{ flex-direction:column; } }
  </style>
</head>
<body>

<h1>Estudo Numerológico Cabalístico</h1>
<div class="container">
  <div class="campo"> Nome completo (igual certidão) <input id="nome" type="text" placeholder="Ex: João Silva"> </div>
  <div class="campo"> Data de nascimento <input id="data" type="date"> </div>
  <div class="botoes-topo">
    <button class="btn-gerar" onclick="gerarMapa()">Gerar Mapa Gratuito</button>
    <a id="btnPremium" onclick="validarPremium()" class="btn-premium">🔓 Relatório Premium</a>
  </div>
</div>

<div id="resultado" style="margin-top: 40px; width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

<script src="textos.js"></script>

<script>
const tabela = { A:1, J:1, I:1, Q:1, Y:1, B:2, K:2, R:2, C:3, G:3, L:3, S:3, D:4, M:4, T:4, E:5, H:5, N:5, U:6, V:6, W:6, X:6, Ç:6, O:7, Z:7, F:8, P:8 };
const vogais = ["A","E","I","O","U"];

const bancoLegendasCompleto = {
    "Liderança": { nums: [1], cat: "Realização" }, "Visão Empreendedora": { nums: [1, 8], cat: "Realização" }, "Autoridade": { nums: [8], cat: "Realização" },
    "Gestão Financeira": { nums: [8, 4], cat: "Realização" }, "Poder de Execução": { nums: [4, 8], cat: "Realização" }, "Ambição": { nums: [8, 1], cat: "Realização" },
    "Independência": { nums: [1, 5], cat: "Realização" }, "Proatividade": { nums: [1], cat: "Realização" }, "Domínio": { nums: [1, 8], cat: "Realização" },
    "Competitividade": { nums: [1, 8, 5], cat: "Realização" }, "Senso de Oportunidade": { nums: [5, 8], cat: "Realização" }, "Realização Material": { nums: [8, 4], cat: "Realização" },
    "Análise": { nums: [7], cat: "Mentalidade" }, "Estratégia": { nums: [4, 7, 8], cat: "Mentalidade" }, "Perfeccionismo": { nums: [4], cat: "Mentalidade" },
    "Discernimento": { nums: [7, 9], cat: "Mentalidade" }, "Organização": { nums: [4], cat: "Mentalidade" }, "Inovação": { nums: [1, 5], cat: "Mentalidade" },
    "Disciplina": { nums: [4, 1], cat: "Mentalidade" }, "Praticidade": { nums: [4, 8], cat: "Mentalidade" }, "Concentração": { nums: [7, 4], cat: "Mentalidade" },
    "Visão Sistêmica": { nums: [9, 7, 8], cat: "Mentalidade" }, "Racionalidade": { nums: [4, 7], cat: "Mentalidade" }, "Método": { nums: [4], cat: "Mentalidade" },
    "Magnetismo": { nums: [3, 5], cat: "Social" }, "Diplomacia": { nums: [2], cat: "Social" }, "Persuasão": { nums: [3, 8], cat: "Social" },
    "Carisma": { nums: [3], cat: "Social" }, "Mediação": { nums: [2, 6], cat: "Social" }, "Eloquência": { nums: [3, 5], cat: "Social" },
    "Influência": { nums: [8, 3, 9], cat: "Social" }, "Extroversão": { nums: [3, 5], cat: "Social" }, "Expressividade": { nums: [3], cat: "Social" },
    "Networking": { nums: [5, 3, 2], cat: "Social" }, "Poder de Convencimento": { nums: [3, 1, 8], cat: "Social" }, "Popularidade": { nums: [3, 6], cat: "Social" },
    "Empatia": { nums: [2, 9], cat: "Essência" }, "Acolhimento": { nums: [6], cat: "Essência" }, "Intuição": { nums: [7, 9], cat: "Essência" },
    "Altruísmo": { nums: [9], cat: "Essência" }, "Equilíbrio": { nums: [6, 2], cat: "Essência" }, "Sensibilidade": { nums: [2, 7], cat: "Essência" },
    "Idealismo": { nums: [9, 6], cat: "Essência" }, "Harmonia": { nums: [6], cat: "Essência" }, "Generosidade": { nums: [9, 6], cat: "Essência" },
    "Espiritualidade": { nums: [7, 9], cat: "Essência" }, "Zelo": { nums: [6, 4], cat: "Essência" }, "Paternidade/Maternidade": { nums: [6, 2], cat: "Essência" },
    "Versatilidade": { nums: [5], cat: "Evolução" }, "Adaptação": { nums: [5, 2], cat: "Evolução" }, "Dinamismo": { nums: [5, 1], cat: "Evolução" },
    "Resiliência": { nums: [9, 4], cat: "Evolução" }, "Ousadia": { nums: [1, 5], cat: "Evolução" }, "Flexibilidade": { nums: [5, 3], cat: "Evolução" },
    "Desapego": { nums: [9, 5], cat: "Evolução" }, "Curiosidade": { nums: [5, 7], cat: "Evolução" }, "Transformação": { nums: [9, 5, 1], cat: "Evolução" },
    "Agilidade": { nums: [5, 1], cat: "Evolução" }, "Liberdade": { nums: [5], cat: "Evolução" }, "Aventura": { nums: [5], cat: "Evolução" }
};

function reduzir(n) { if (n === 0) return 0; n = Math.abs(n); let r = n % 9; return r === 0 ? 9 : r; }

function calcularValorComAcentos(letra) {
  const base = letra.normalize("NFD")[0];
  const valorBase = tabela[base];
  if (!valorBase) return 0;
  let soma = 0, mult = 1;
  const normalizada = letra.normalize("NFD");
  for (let i = 1; i < normalizada.length; i++) {
    const c = normalizada[i];
    if (c === "\u0301") soma += 2; else if (c === "\u0302") soma += 7;
    else if (c === "\u0303") soma += 3; else if (c === "\u0327") soma += 6;
    else if (c === "\u0300" || c === "\u0308") mult *= 2;
  }
  return (valorBase + soma) * mult;
}

function calcularVibracaoEssencia(nomeCompleto) {
    const partes = nomeCompleto.trim().toUpperCase().split(/\s+/);
    let soma = 0;
    partes.forEach(p => { if(p.length > 0) soma += calcularValorComAcentos(p[0]); });
    return reduzir(soma);
}

function calcularTalento(motivacao, personalidade) { return reduzir(motivacao + personalidade); }

function calcularEquilibrio(nomeCompleto) {
    const partes = nomeCompleto.trim().toUpperCase().split(/\s+/);
    let somaIniciais = 0;
    partes.forEach(p => { 
        if(p.length > 0) {
            const letraBase = p[0].normalize("NFD")[0];
            somaIniciais += tabela[letraBase] || 0;
        }
    });
    return reduzir(somaIniciais);
}

function obterPoderConclusao(primeiroNome) {
    if (!primeiroNome) return { letra: "", valor: 0 };
    const ultimaLetra = primeiroNome.trim().slice(-1).toUpperCase();
    const valor = tabela[ultimaLetra.normalize("NFD")[0]] || 0;
    return { letra: ultimaLetra, valor: valor };
}

function calcularIntensidadeAtributo(numerosAlvo, resultados, faltantes, desafios, nome) {
    let intensidade = 0;
    const nomeLimpo = nome.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    numerosAlvo.forEach(num => {
        if (resultados.motivacao === num) intensidade += 3.5;
        if (resultados.personalidade === num) intensidade += 3.5;
        if (resultados.influencia === num) intensidade += 2.0;
        if (resultados.diaN === num) intensidade += 2.5;
        for (let letra of nomeLimpo) { if (tabela[letra] === num) intensidade += 0.4; }
        if (faltantes.includes(num)) intensidade -= 3.0;
        if (desafios.includes(num)) intensidade -= 1.5;
    });
    return Math.max(0, Math.min(10, intensidade)).toFixed(1);
}

function gerarGraficosIntensidade(resultados, faltantes, desafios, nomeCompleto) {
    let rankingGeral = [];
    for (let legenda in bancoLegendasCompleto) {
        const dados = bancoLegendasCompleto[legenda];
        const nota = calcularIntensidadeAtributo(dados.nums, resultados, faltantes, desafios, nomeCompleto);
        rankingGeral.push({ nome: legenda, nota: parseFloat(nota), categoria: dados.cat });
    }
    rankingGeral.sort((a, b) => b.nota - a.nota);
    const instintoSuperior = rankingGeral[0];
    const categorias = ["Realização", "Mentalidade", "Social", "Essência", "Evolução"];
    let html = `<div class="card" style="background: #0a0e1a; color: #d4af37; border: 2px solid #d4af37; text-align:center; padding: 25px; margin-bottom: 30px;">
            <h2 style="margin:0; font-size: 14px; letter-spacing:3px; opacity: 0.8; border:none;">FORÇA PREDOMINANTE</h2>
            <div style="font-size: 32px; font-weight: bold; margin: 10px 0; text-transform: uppercase;">${instintoSuperior.nome}</div>
            <p style="color: white; font-size: 13px; margin:0; opacity: 0.9;">Esta é a sua frequência dominante.</p>
        </div>`;
    categorias.forEach(cat => {
        const itensDaCat = rankingGeral.filter(item => item.categoria === cat).slice(0, 3);
        html += `<div class="card" style="border-top: 4px solid #d4af37; margin-bottom: 25px;"><h3 style="color: #888; font-size: 11px; text-transform: uppercase; border:none;">Pilar de ${cat}</h3>`;
        itensDaCat.forEach(item => {
            const porcento = item.nota * 10;
            html += `<div style="margin-bottom: 12px;"><div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; color: #111;"><span>${item.nome}</span><span style="color: #d4af37;">${Math.round(porcento)}%</span></div>
                <div style="height: 6px; background: #f0f0f0; border-radius: 10px; margin-top:4px; overflow:hidden;"><div style="width: ${porcento}%; height: 100%; background: #d4af37;"></div></div></div>`;
        });
        html += `</div>`;
    });
    return html;
}

let mapaGerado = false;

function gerarMapa() {
  const nomeInput = document.getElementById("nome").value.trim();
  const dataInput = document.getElementById("data").value;
  if(nomeInput.length < 5 || !dataInput) { alert("Preencha nome e data."); return; }

  const [ano, mes, dia] = dataInput.split("-").map(Number);
  const nomeUp = nomeInput.toUpperCase();

  let somaV = 0, somaC = 0, usados = new Set();
  for (let l of nomeUp) {
    const valor = calcularValorComAcentos(l);
    if (!valor) continue;
    const base = l.normalize("NFD")[0];
    if(tabela[base]) usados.add(tabela[base]);
    vogais.includes(base) ? somaV += valor : somaC += valor;
  }

  const res = {
      diaN: dia, motivacao: reduzir(somaV), influencia: reduzir(somaC),
      personalidade: reduzir(somaV + somaC), comportamento: reduzir(dia),
      caminhoVida: reduzir(dia + mes + ano), anoPessoal: reduzir(dia + mes + new Date().getFullYear())
  };
  res.missao = reduzir(res.caminhoVida + res.personalidade);

  const numEssencia = calcularVibracaoEssencia(nomeInput);
  const numTalento = calcularTalento(res.motivacao, res.personalidade);
  const numEquilibrio = calcularEquilibrio(nomeInput);
  const infoConclusao = obterPoderConclusao(nomeInput.split(' ')[0]);

  let faltantes = []; for (let i=1; i<=9; i++) if(!usados.has(i)) faltantes.push(i);
  let d1 = reduzir(Math.abs(dia - mes)), d2 = reduzir(Math.abs(dia - reduzir(ano))), d3 = reduzir(Math.abs(d1 - d2));
  const c1 = reduzir(mes), c2 = reduzir(dia), c3 = reduzir(ano);
  const md1 = reduzir(dia + mes), md4 = reduzir(mes + ano);

  const htmlGraficos = gerarGraficosIntensidade(res, faltantes, [d1, d2, d3], nomeInput);

  document.getElementById("resultado").innerHTML = `
    ${htmlGraficos}
    
    <div class="card" style="background: #0a0e1a; color: #fff; border-left: 10px solid #d4af37;">
        <h3 style="color:#d4af37; border:none;">🛡️ SEGREDOS DA ALMA</h3>
        <p><strong>Essência:</strong> ${numEssencia}<br><small style="color:#aaa;">${textos.essencia ? textos.essencia[numEssencia] : ""}</small></p>
        <p><strong>Talento:</strong> ${numTalento}<br><small style="color:#aaa;">${textos.talento ? textos.talento[numTalento] : ""}</small></p>
        <p><strong>Equilíbrio:</strong> ${numEquilibrio}<br><small style="color:#aaa;">${textos.equilibrio ? textos.equilibrio[numEquilibrio] : ""}</small></p>
        <p><strong>Conclusão:</strong> Letra "${infoConclusao.letra}" (Vibração ${infoConclusao.valor})</p>
    </div>

    ${card("Motivação", "Seu Íntimo", res.motivacao, textos.motivacao[res.motivacao])}
    ${card("Influência", "Sua Imagem", res.influencia, textos.influencia[res.influencia])}
    ${card("Personalidade", "Sua Expressão", res.personalidade, textos.Personalidade[res.personalidade])}

    <div class="card" style="background: #fafafa; border-top: 4px solid #3b82f6;">
        <h3 style="border:none;">🧠 MENTALIDADE MODERNA</h3>
        <p><strong>Déficits:</strong><br><small style="color:#666;">${faltantes.map(n => textos.deficits[n]).join("<br>")}</small></p>
        <p><strong>Subconsciente:</strong><br><small style="color:#666;">${textos.subconsciente[9 - faltantes.length]}</small></p>
    </div>

    ${card("Caminho de Vida", "Seu Destino", res.caminhoVida, textos.CaminhodeVida[res.caminhoVida])}
    ${card("Missão", "Seu Propósito", res.missao, textos.Propósito[res.missao])}

    <div class="card">
        <h3>Previsões e Ciclos</h3>
        <p><strong>Ciclo Atual:</strong> ${textos.ciclos[1][c1]}</p>
        <p><strong>Desafio Principal:</strong> ${textos.desafios[3][d3]}</p>
        <p><strong>Ano Pessoal:</strong> ${textos.anoPessoal[res.anoPessoal]}</p>
    </div>
  `;

  mapaGerado = true;
  window.scrollTo({ top: document.getElementById("resultado").offsetTop - 20, behavior: 'smooth' });
}

function card(titulo, subtitulo, numero, textoRaw) {
  return `<div class="card"><h3>${titulo}</h3><p><strong>${subtitulo}</strong> | Número: ${numero}</p><div class="texto">${textoRaw}</div></div>`;
}

function validarPremium() { if(!mapaGerado){ alert("Gere o mapa."); return; } window.open("https://hemricciinstintosuperior-rcci.github.io/estudo_numerologico/premiummapa.html","_blank"); }
</script>
</body>
</html>
