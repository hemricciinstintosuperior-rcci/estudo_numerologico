<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instinto Superior - Numerologia Cabalística</title>
  <style>
    html, body { width:100%; overflow-x:hidden; }
    *{ box-sizing:border-box; }
    body{ font-family: Arial, sans-serif; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; background: #f9fafb; }
    h1{ text-align:center; margin-bottom:30px; color: #111827; }
    .container{ width:100%; max-width:500px; display:flex; flex-direction:column; gap:20px; }
    .campo{ display:flex; flex-direction:column; font-size:14px; font-weight:bold; color:#333; }
    .campo input{ margin-top:8px; padding:14px; font-size:16px; border-radius:8px; border:1px solid #ccc; background:#e5e7eb; width:100%; }
    .botoes-topo{ display:flex; gap:15px; margin-top:30px; width:100%; }
    .btn-gerar, .btn-premium{ flex:1; padding:16px; font-size:16px; border-radius:10px; font-weight:bold; text-align:center; cursor: pointer; border: none; }
    .btn-gerar{ background:#22c55e; color:white; }
    .btn-premium{ background:linear-gradient(45deg,#6a11cb,#2575fc); color:white; text-decoration:none; display: block; }
    .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 600px; }
    .card h3 { color: #1f2937; margin-top: 0; border-bottom: 2px solid #f3f4f6; padding-bottom: 10px; }
    .texto { white-space: pre-line; color: #4b5563; line-height: 1.6; font-size: 16px; margin-top: 15px; }
    @media (max-width:600px){ .botoes-topo{ flex-direction:column; } }
  </style>
</head>
<body>

<h1>Estudo Numerológico Cabalístico</h1>
<div class="container">
  <div class="campo"> Nome completo (igual certidão) <input id="nome" type="text" placeholder="Ex: João Silva"> </div>
  <div class="campo"> Data de nascimento <input id="data" type="date"> </div>
  <div class="botoes-topo">
    <button class="btn-gerar" onclick="gerarMapa()">Gerar Mapa Gratuito</button>
    <a id="btnPremium" onclick="validarPremium()" class="btn-premium">🔓 Relatório Premium</a>
  </div>
</div>

<div id="resultado" style="margin-top: 40px; width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

<script src="textos.js"></script>

<script>
const tabela = { A:1, J:1, I:1, Q:1, Y:1, B:2, K:2, R:2, C:3, G:3, L:3, S:3, D:4, M:4, T:4, E:5, H:5, N:5, U:6, V:6, W:6, X:6, Ç:6, O:7, Z:7, F:8, P:8 };
const vogais = ["A","E","I","O","U"];

// --- FUNÇÕES DE CÁLCULO BASE ---
function reduzir(n) {
  if (n === 0) return 0;
  n = Math.abs(n);
  let r = n % 9;
  return r === 0 ? 9 : r;
}

function calcularValorComAcentos(letra) {
  const base = letra.normalize("NFD")[0];
  const valorBase = tabela[base];
  if (!valorBase) return 0;
  let soma = 0, mult = 1;
  const normalizada = letra.normalize("NFD");
  for (let i = 1; i < normalizada.length; i++) {
    const c = normalizada[i];
    if (c === "\u0301") soma += 2; 
    else if (c === "\u0302") soma += 7;
    else if (c === "\u0303") soma += 3; 
    else if (c === "\u0327") soma += 6;
    else if (c === "\u0300" || c === "\u0308") mult *= 2;
  }
  return (valorBase + soma) * mult;
}

// --- NOVAS FUNÇÕES ADICIONADAS ---

function calcularVibracaoEssencia(nomeCompleto) {
    const partes = nomeCompleto.trim().toUpperCase().split(/\s+/);
    let somaIniciais = 0;
    partes.forEach(parte => {
        if (parte.length > 0) somaIniciais += calcularValorComAcentos(parte[0]);
    });
    return reduzir(somaIniciais);
}

function calcularTalentoOculto(motivacao, personalidade) {
    return reduzir(motivacao + personalidade);
}

function obterPoderConclusao(primeiroNome) {
    if (!primeiroNome) return { letra: "", valor: 0 };
    const ultimaLetra = primeiroNome.trim().slice(-1).toUpperCase();
    const valor = tabela[ultimaLetra.normalize("NFD")[0]] || 0;
    return { letra: ultimaLetra, valor: valor };
}

// --- FUNÇÕES DE INTERFACE ---

function aplicarFiltroTexto(texto) {
    if (!texto) return "";
    let nomeInput = document.getElementById("nome").value.trim();
    let pNome = nomeInput.split(' ')[0] || "você";
    return texto.replace(/você/gi, `<strong>${pNome}</strong>`);
}

function card(titulo, subtitulo, numero, textoRaw) {
  return `<div class="card"><h3>${titulo}</h3><p><strong>${subtitulo}</strong> | Número: ${numero}</p><div class="texto">${aplicarFiltroTexto(textoRaw)}</div></div>`;
}

function calcularIntensidadeAtributo(numerosAlvo, resultados, faltantes, desafios, nome) {
    let intensidade = 0;
    const nomeLimpo = nome.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    numerosAlvo.forEach(num => {
        if (resultados.motivacao === num) intensidade += 3.5;
        if (resultados.personalidade === num) intensidade += 3.5;
        if (resultados.influencia === num) intensidade += 2.0;
        if (resultados.diaN === num) intensidade += 2.5;
        if (resultados.comportamento === num) intensidade += 2.0;
        for (let letra of nomeLimpo) { if (tabela[letra] === num) intensidade += 0.4; }
        if (faltantes.includes(num)) intensidade -= 3.0;
        if (desafios.includes(num)) intensidade -= 1.5;
    });
    return Math.max(0, Math.min(10, intensidade)).toFixed(1);
}

function gerarGraficosIntensidade(resultados, faltantes, desafios, nomeCompleto) {
    let rankingGeral = [];
    for (let legenda in bancoLegendasCompleto) {
        const dados = bancoLegendasCompleto[legenda];
        const nota = calcularIntensidadeAtributo(dados.nums, resultados, faltantes, desafios, nomeCompleto);
        rankingGeral.push({ nome: legenda, nota: parseFloat(nota), categoria: dados.cat });
    }
    rankingGeral.sort((a, b) => b.nota - a.nota);
    const instintoSuperior = rankingGeral[0];
    const categorias = ["Realização", "Mentalidade", "Social", "Essência", "Evolução"];

    let html = `
        <div class="card" style="background: #0a0e1a; color: #d4af37; border: 2px solid #d4af37; text-align:center; padding: 25px; margin-bottom: 30px;">
            <h2 style="margin:0; font-size: 14px; letter-spacing:3px; opacity: 0.8; border:none;">FORÇA PREDOMINANTE</h2>
            <div style="font-size: 32px; font-weight: bold; margin: 10px 0; text-transform: uppercase;">${instintoSuperior.nome}</div>
            <p style="color: white; font-size: 13px; margin:0; opacity: 0.9;">Este é o seu Instinto Superior, a frequência que domina seu campo vibracional hoje.</p>
        </div>
    `;

    categorias.forEach(cat => {
        const itensDaCat = rankingGeral.filter(item => item.categoria === cat).slice(0, 3);
        html += `<div class="card" style="border-top: 4px solid #d4af37; margin-bottom: 25px;">
                <h3 style="color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; border:none;">Pilar de ${cat}</h3>`;
        itensDaCat.forEach(item => {
            const porcento = item.nota * 10;
            html += `
                <div style="margin-bottom: 18px;">
                    <div style="display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; color: #111;">
                        <span>${item.nome}</span>
                        <span style="color: #d4af37;">${Math.round(porcento)}%</span>
                    </div>
                    <div style="height: 6px; background: #f0f0f0; border-radius: 10px; overflow: hidden; margin-top:6px;">
                        <div style="width: ${porcento}%; height: 100%; background: #d4af37; box-shadow: 0 0 10px rgba(212,175,55,0.2); transition: width 2s;"></div>
                    </div>
                </div>`;
        });
        html += `</div>`;
    });

    const pontosAtencao = rankingGeral.slice(-4).reverse();
    html += `<div class="card" style="background: #fff5f5; border: 1px solid #ffcccc;">
            <h3 style="color: #c53030; margin-top:0; border:none; font-size: 16px;">⚠️ NECESSIDADES DE DESENVOLVIMENTO</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                ${pontosAtencao.map(item => `
                    <div style="background: white; padding: 10px; border-radius: 6px; border: 1px solid #fee2e2; font-size: 12px; font-weight: bold; color: #444; text-align:center;">
                        ${item.nome} <br><span style="color: #c53030;">${Math.round(item.nota * 10)}%</span>
                    </div>`).join("")}
            </div></div>`;
    return html;
}

let mapaGerado = false;

function gerarMapa() {
  const nomeInput = document.getElementById("nome").value.trim();
  const dataInput = document.getElementById("data").value;
  if(nomeInput.length < 5 || !dataInput) { alert("Preencha nome completo e data."); return; }

  const [ano, mes, dia] = dataInput.split("-").map(Number);
  const nomeUp = nomeInput.toUpperCase();

  // 1. Cálculos Base
  let somaV = 0, somaC = 0, usados = new Set();
  for (let l of nomeUp) {
    const valor = calcularValorComAcentos(l);
    if (!valor) continue;
    const base = l.normalize("NFD")[0];
    const valTabela = tabela[base];
    if(valTabela) usados.add(valTabela);
    vogais.includes(base) ? somaV += valor : somaC += valor;
  }

  const res = {
      diaN: dia,
      motivacao: reduzir(somaV),
      influencia: reduzir(somaC),
      personalidade: reduzir(somaV + somaC),
      comportamento: reduzir(dia),
      caminhoVida: reduzir(dia + mes + ano),
      anoPessoal: reduzir(dia + mes + new Date().getFullYear())
  };
  res.missao = reduzir(res.caminhoVida + res.personalidade);

  // 2. Novas Funções Chamadas
  const numEssencia = calcularVibracaoEssencia(nomeInput);
  const numTalentoOculto = calcularTalentoOculto(res.motivacao, res.personalidade);
  const infoConclusao = obterPoderConclusao(nomeInput.split(' ')[0]);

  // 3. Faltantes e Desafios
  let faltantes = [];
  for (let i=1; i<=9; i++) if(!usados.has(i)) faltantes.push(i);
  const d1 = reduzir(Math.abs(dia - mes));
  const d2 = reduzir(Math.abs(dia - reduzir(ano)));
  const d3 = reduzir(Math.abs(d1 - d2));

  // 4. Montagem Premium
  const fim1 = 37 - res.caminhoVida, fim2 = fim1 + 27;
  const t = textos; // Assume que 'textos' vem do textos.js
  
  const dadosPremium = {
    nome: nomeInput,
    data: dataInput.split("-").reverse().join("/"),
    resultados: res,
    essencia: numEssencia,
    talentoOculto: numTalentoOculto,
    conclusao: infoConclusao,
    periodos: { ciclo1: `0-${fim1}`, ciclo2: `${fim1+1}-${fim2}`, ciclo3: `>${fim2}` },
    textos: {
        dia: t.dia[res.diaN],
        motivacao: t.motivacao[res.motivacao],
        influencia: t.influencia[res.influencia],
        expressao: t.Personalidade[res.personalidade],
        destino: t.CaminhodeVida[res.caminhoVida],
        missao: t.Propósito[res.missao],
        anoPessoal: t.anoPessoal[res.anoPessoal]
    }
  };

  localStorage.setItem("dadosMapaPremium", JSON.stringify(dadosPremium));
  const htmlGraficos = gerarGraficosIntensidade(res, faltantes, [d1, d2, d3], nomeInput);

  // 5. EXIBIÇÃO FINAL
  document.getElementById("resultado").innerHTML = `
    ${htmlGraficos}
    
    <div class="card" style="background: #0a0e1a; border-left: 10px solid #d4af37; color: white;">
        <h3 style="color: #d4af37; border:none;">🛡️ SEGREDOS CABALÍSTICOS</h3>
        <p><strong>Vibração da Essência:</strong> ${numEssencia}<br><small>${textosSegredos.essenciaReativa[numEssencia]}</small></p>
        <hr style="opacity:0.2">
        <p><strong>Talento Oculto:</strong> ${numTalentoOculto}<br><small>${textosSegredos.talentoOculto[numTalentoOculto]}</small></p>
        <hr style="opacity:0.2">
        <p><strong>Poder de Conclusão:</strong> Letra "${infoConclusao.letra}" (${infoConclusao.valor})</p>
    </div>

    ${card("Dia de Nascimento", "Talento Natural", res.diaN, dadosPremium.textos.dia)}
    ${card("Motivação", "Seu Íntimo", res.motivacao, dadosPremium.textos.motivacao)}
    ${card("Influência", "Sua Imagem", res.influencia, dadosPremium.textos.influencia)}
    ${card("Personalidade", "Sua Expressão", res.personalidade, dadosPremium.textos.expressao)}
    ${card("Caminho de Vida", "Seu Destino", res.caminhoVida, dadosPremium.textos.destino)}
    ${card("Missão", "Propósito", res.missao, dadosPremium.textos.missao)}

    <div class="card" style="background: #0a0e1a; color: #fff; text-align:center;">
        <h3 style="color: #d4af37; border-bottom: 1px solid #d4af37;">Ano Pessoal: ${res.anoPessoal}</h3>
        <p>${dadosPremium.textos.anoPessoal}</p>
    </div>

    <div class="card" style="background: linear-gradient(45deg,#6a11cb,#2575fc); color:white; text-align:center;">
        <h3>Obtenha o PDF de Luxo</h3>
        <p>Clique em "Relatório Premium" no topo para baixar.</p>
    </div>
  `;

  mapaGerado = true;
  window.scrollTo({ top: document.getElementById("resultado").offsetTop - 20, behavior: 'smooth' });
}

function validarPremium() {
   if(!mapaGerado){ alert("⚠️ Gere o mapa primeiro."); return; }
   window.open("https://hemricciinstintosuperior-rcci.github.io/estudo_numerologico/premiummapa.html","_blank");
}
</script>
</body>
</html>
