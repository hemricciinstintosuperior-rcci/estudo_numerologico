<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instinto Superior - Numerologia Cabalística</title>
  <style>
    html, body { width:100%; overflow-x:hidden; }
    *{ box-sizing:border-box; }
    body{ font-family: Arial, sans-serif; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; background: #f9fafb; }
    h1{ text-align:center; margin-bottom:30px; color: #111827; }
    .container{ width:100%; max-width:500px; display:flex; flex-direction:column; gap:20px; }
    .campo{ display:flex; flex-direction:column; font-size:14px; font-weight:bold; color:#333; }
    .campo input{ margin-top:8px; padding:14px; font-size:16px; border-radius:8px; border:1px solid #ccc; background:#e5e7eb; width:100%; }
    .botoes-topo{ display:flex; gap:15px; margin-top:30px; width:100%; }
    .btn-gerar, .btn-premium{ flex:1; padding:16px; font-size:16px; border-radius:10px; font-weight:bold; text-align:center; cursor: pointer; border: none; }
    .btn-gerar{ background:#22c55e; color:white; }
    .btn-premium{ background:linear-gradient(45deg,#6a11cb,#2575fc); color:white; text-decoration:none; display: block; }
    .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 600px; }
    .card h3 { color: #1f2937; margin-top: 0; border-bottom: 2px solid #f3f4f6; padding-bottom: 10px; }
    .texto { white-space: pre-line; color: #4b5563; line-height: 1.6; font-size: 16px; margin-top: 15px; }
    @media (max-width:600px){ .botoes-topo{ flex-direction:column; } }
  </style>
</head>
<body>

<h1>Estudo Numerológico Cabalístico</h1>
<div class="container">
  <div class="campo"> Nome completo (igual certidão) <input id="nome" type="text" placeholder="Ex: João Silva"> </div>
  <div class="campo"> Data de nascimento <input id="data" type="date"> </div>
  <div class="botoes-topo">
    <button class="btn-gerar" onclick="gerarMapa()">Gerar Mapa Gratuito</button>
    <a id="btnPremium" onclick="validarPremium()" class="btn-premium">🔓 Relatório Premium</a>
  </div>
</div>

<div id="resultado" style="margin-top: 40px; width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

<script src="textos.js"></script>

<script>
const tabela = { A:1, J:1, I:1, Q:1, Y:1, B:2, K:2, R:2, C:3, G:3, L:3, S:3, D:4, M:4, T:4, E:5, H:5, N:5, U:6, V:6, W:6, X:6, Ç:6, O:7, Z:7, F:8, P:8 };
const vogais = ["A","E","I","O","U"];

const bancoAtributos = {
    "Seu Potencial": { "Proatividade": [1, 5, 8], "Praticidade": [4, 8], "Controle": [4, 1], "Coragem": [1, 5, 9], "Ousadia": [5, 1], "Autoconfiança": [1, 8], "Liderança": [1, 8, 4], "Independência": [1, 5], "Individualismo": [1] },
    "Sua Essência": { "Sensibilidade": [2, 6, 9], "Curiosidade": [5, 3], "Introspecção": [7, 9], "Intelecto": [7, 1], "Racionalidade": [4, 7], "Lógica": [4, 7, 8], "Senso Crítico": [7, 4, 1], "Autojulgamento": [7, 6], "Instintividade": [5, 9, 2], "Espontaneidade": [3, 5], "Influenciabilidade": [2, 6], "Impulsividade": [1, 5], "Persistência": [4, 8, 9] },
    "Capacidade de Aproveitar a Vida": { "Alegria": [3, 5], "Jovialidade": [3, 5], "Dinamismo": [5, 1, 8], "Capacidade de Perdoar": [9, 6, 2], "Otimismo": [3, 9], "Extroversão": [3, 5], "Espiritualidade": [7, 9], "Poder de Persuasão": [3, 5, 8], "Adaptabilidade": [5, 2] },
    "Relacionamentos e Afeto": { "Demonstração de Afeto": [6, 2, 3, 9], "Cooperação": [2, 6, 9], "Tolerância": [9, 6, 2], "Diplomacia": [2], "Comprometimento": [4, 6, 8], "Lealdade": [4, 6], "Aconselhamento": [6, 9], "Magnetismo Pessoal": [1, 3, 5, 8] },
    "Necessidades a Trabalhar": { "Adaptabilidade": [5, 2], "Autocontrole": [4, 8], "Flexibilidade": [5, 3, 9], "Humildade": [2, 6, 9], "Paciência": [2, 4, 7] }
};

function reduzir(n) {
  n = Math.abs(n);
  while (n > 9) { n = n.toString().split("").reduce((a,b)=>a+Number(b),0); }
  return n;
}

function calcularValorComAcentos(letra) {
  const base = letra.normalize("NFD")[0];
  const valorBase = tabela[base];
  if (!valorBase) return 0;
  let soma = 0, mult = 1;
  for (let c of letra.normalize("NFD")) {
    if (c === "\u0301") soma += 2; else if (c === "\u0302") soma += 7;
    else if (c === "\u0303") soma += 3; else if (c === "\u0327") soma += 6;
    else if (c === "\u0300" || c === "\u0308") mult *= 2;
  }
  return (valorBase + soma) * mult;
}

function aplicarFiltroTexto(texto) {
    if (!texto) return "";
    let nomeInput = document.getElementById("nome").value.trim();
    let nome = nomeInput.split(' ')[0] || "você";
    const regex = /você/gi;
    return texto.replace(regex, `<strong>${nome}</strong>`);
}

function card(titulo, subtitulo, numero, textoRaw) {
  return `<div class="card"><h3>${titulo}</h3><p><strong>${subtitulo}</strong> | Número: ${numero}</p><div class="texto">${aplicarFiltroTexto(textoRaw)}</div></div>`;
}

function calcularIntensidadeAtributo(numerosAlvo, resultados, faltantes, desafios, nome) {
    let intensidade = 0;
    numerosAlvo.forEach(num => {
        if (resultados.motivacao === num) intensidade += 3.5;
        if (resultados.personalidade === num) intensidade += 3.5;
        if (resultados.influencia === num) intensidade += 2.0;
        if (resultados.diaN === num) intensidade += 2.5;
        if (resultados.comportamento === num) intensidade += 2.0;
        const nomeLimpo = nome.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        for (let letra of nomeLimpo) { if (tabela[letra] === num) intensidade += 0.4; }
        if (faltantes.includes(num)) intensidade -= 3.0;
        if (desafios.includes(num)) intensidade -= 1.5;
    });
    return Math.max(0, Math.min(10, intensidade)).toFixed(1);
}

function gerarGraficosIntensidade(resultados, faltantes, desafios, nomeCompleto) {
    let html = "";
    for (let categoria in bancoAtributos) {
        const legendas = Object.keys(bancoAtributos[categoria]).sort((a,b) => a.localeCompare(b));
        html += `<div class="card" style="border-top: 4px solid #d4af37;"><h2>${categoria.toUpperCase()}</h2>`;
        legendas.forEach(legenda => {
            const nota = calcularIntensidadeAtributo(bancoAtributos[categoria][legenda], resultados, faltantes, desafios, nomeCompleto);
            const porcento = nota * 10;
            let corBarra = porcento > 70 ? "#d4af37" : (porcento > 35 ? "#4b5563" : "#9ca3af");
            html += `<div style="margin-bottom: 12px;"><div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: bold;"><span>${legenda}</span><span>${Math.round(porcento)}%</span></div><div style="height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin-top:4px;"><div style="width: ${porcento}%; height: 100%; background: ${corBarra}; transition: width 1.5s;"></div></div></div>`;
        });
        html += `</div>`;
    }
    return html;
}

let mapaGerado = false;

function gerarMapa() {
  const nomeInput = document.getElementById("nome").value.trim();
  const dataInput = document.getElementById("data").value;
  if(nomeInput.length < 5 || !dataInput) { alert("Preencha nome completo e data."); return; }

  const nome = nomeInput.toUpperCase();
  const [ano, mes, dia] = dataInput.split("-").map(Number);

  let somaV = 0, somaC = 0, usados = new Set();
  for (let l of nome) {
    const valor = calcularValorComAcentos(l);
    if (!valor) continue;
    const base = l.normalize("NFD")[0];
    usados.add(tabela[base] || 0);
    vogais.includes(base) ? somaV += valor : somaC += valor;
  }

  const res = {
      diaN: dia,
      motivacao: reduzir(somaV),
      influencia: reduzir(somaC),
      personalidade: reduzir(somaV + somaC),
      comportamento: reduzir(dia),
      caminhoVida: reduzir(dia + mes + ano),
      anoPessoal: reduzir(dia + mes + new Date().getFullYear())
  };

  // ============================================
// NOVOS CÁLCULOS: NUMEROLOGIA MODERNA
// ============================================

// --- 1. DÉFICIT DE COMPORTAMENTO ---
// Regra: Dia de Nascimento reduzido + Repetições entre Propósito, Objetivo, Personalidade e Motivação.
let deficitPrincipal = reduzir(dia);
let deficitsOcultos = [];
const listaConferir = [res.missao, res.caminhoVida, res.personalidade, res.motivacao];

// Verifica se há números repetidos na lista
for (let i = 0; i < listaConferir.length; i++) {
    for (let j = i + 1; j < listaConferir.length; j++) {
        if (listaConferir[i] === listaConferir[j]) {
            deficitsOcultos.push(listaConferir[i]);
        }
    }
}
// Remove duplicados dos ocultos
let deficitsFinais = [...new Set([deficitPrincipal, ...deficitsOcultos])];

// --- 2. INCLINAÇÃO OCULTA ---
// Regra: Números que aparecem 3 ou mais vezes no nome. O 9 sempre está incluso.
let contagemLetras = {};
let inclinações = [9]; // O 9 é padrão para todos

const nomeLimpo = nomeInput.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
for (let letra of nomeLimpo) {
    let num = tabela[letra];
    if (num) {
        contagemLetras[num] = (contagemLetras[num] || 0) + 1;
    }
}

for (let num in contagemLetras) {
    if (contagemLetras[num] >= 3 && num != 9) {
        inclinações.push(Number(num));
    }
}

// --- 3. SUBCONSCIENTE ---
// Regra: 9 menos a quantidade de números faltantes no nome.
let subconscienteNum = 9 - faltantes.length;

// --- 4. TALENTOS ESPECIAIS E DEFICIÊNCIAS ---
// Regra: No PRIMEIRO NOME, se um número aparecer o dobro ou mais que qualquer outro.
let primeiroNome = nomeInput.split(' ')[0].toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
let contagemPrimeiroNome = {};
for (let letra of primeiroNome) {
    let num = tabela[letra];
    if (num) contagemPrimeiroNome[num] = (contagemPrimeiroNome[num] || 0) + 1;
}

let talentoEspecial = null;
let maxRepeticao = 0;
let segundoMaior = 0;

for (let num in contagemPrimeiroNome) {
    if (contagemPrimeiroNome[num] > maxRepeticao) {
        segundoMaior = maxRepeticao;
        maxRepeticao = contagemPrimeiroNome[num];
        talentoEspecial = num;
    } else if (contagemPrimeiroNome[num] > segundoMaior) {
        segundoMaior = contagemPrimeiroNome[num];
    }
}
// Verifica se é o dobro ou mais que o segundo colocado
if (maxRepeticao < (segundoMaior * 2)) talentoEspecial = null;

// ============================================
// ADICIONANDO AO OBJETO PREMIUM
// ============================================
dadosPremium.moderna = {
    deficits: deficitsFinais,
    inclinacoes: inclinações,
    subconsciente: subconscienteNum,
    talentoEspecial: talentoEspecial
},
  res.missao = reduzir(res.caminhoVida + res.personalidade);

  // Cálculos Adicionais
  const ciclo1 = reduzir(mes), ciclo2 = reduzir(dia), ciclo3 = reduzir(ano);
  const md1 = reduzir(dia + mes), md2 = reduzir(dia + ano), md3 = reduzir(md1 + md2), md4 = reduzir(mes + ano);
  const d1 = reduzir(Math.abs(dia - mes)), d2 = reduzir(Math.abs(dia - reduzir(ano))), d3 = reduzir(Math.abs(d1 - d2));
  const fim1 = 37 - res.caminhoVida, fim2 = fim1 + 27;

  let faltantes = [];
  for (let i=1; i<=9; i++) if(!usados.has(i)) faltantes.push(i);
  let textoDeficiencias = faltantes.map(n => (textos.deficiencias ? textos.deficiencias[n] : "")).join(" ");

  const dadosPremium = {
    nome: nomeInput,
    data: dataInput.split("-").reverse().join("/"),
    resultados: res,
    periodos: { ciclo1: `0-${fim1}`, ciclo2: `${fim1+1}-${fim2}`, ciclo3: `>${fim2}`, md1: `0-${fim1}`, md2: `${fim1+1}-${fim1+9}`, md3: `${fim1+10}-${fim1+18}`, md4: `>${fim2}` },
    textos: {
        dia: textos.dia[res.diaN],
        motivacao: textos.motivacao[res.motivacao],
        influencia: textos.influencia[res.influencia],
        expressao: textos.Personalidade[res.personalidade],
        comportamento: textos.comportamento[res.comportamento],
        destino: textos.CaminhodeVida[res.caminhoVida],
        missao: textos.Propósito[res.missao],
        ciclo1: (textos.ciclos) ? textos.ciclos[1][ciclo1] : "",
        ciclo2: (textos.ciclos) ? textos.ciclos[2][ciclo2] : "",
        ciclo3: (textos.ciclos) ? textos.ciclos[3][ciclo3] : "",
        md1: (textos.momentos) ? textos.momentos[1][md1] : "",
        md2: (textos.momentos) ? textos.momentos[2][md2] : "",
        md3: (textos.momentos) ? textos.momentos[3][md3] : "",
        md4: (textos.momentos) ? textos.momentos[4][md4] : "",
        d1: (textos.desafios) ? textos.desafios[1][d1] : "",
        d2: (textos.desafios) ? textos.desafios[2][d2] : "",
        d3: (textos.desafios) ? textos.desafios[3][d3] : "",
        anoPessoal: textos.anoPessoal[res.anoPessoal],
        deficiencias: textoDeficiencias
    }
  };

  const htmlAnalise = gerarGraficosIntensidade(res, faltantes, [d1, d2, d3], nomeInput);
  localStorage.setItem("dadosMapaPremium", JSON.stringify(dadosPremium));
  localStorage.setItem("graficoParaOPremium", htmlAnalise);
  
  document.getElementById("resultado").innerHTML = htmlAnalise + 
    card("Dia de Nascimento", "Talentos Naturais", res.diaN, textos.dia[res.diaN]) +
    card("Influência", "Sua Imagem", res.influencia, textos.influencia[res.influencia]) +
    card("Motivação", "Seu Íntimo", res.motivacao, textos.motivacao[res.motivacao]) +
    card("Personalidade", "Sua Expressão", res.personalidade, textos.Personalidade[res.personalidade]);

  mapaGerado = true;
  window.scrollTo({ top: document.getElementById("resultado").offsetTop - 20, behavior: 'smooth' });
}

function validarPremium() {
   if(!mapaGerado){ alert("⚠️ Gere o mapa primeiro."); return; }
   window.open("https://hemricciinstintosuperior-rcci.github.io/estudo_numerologico/premiummapa.html","_blank");
}
</script>
</body>
</html>
